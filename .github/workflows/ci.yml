name: CI

on:
  push:
    branches: [main, production]
  pull_request:
    branches: [main, production]
  merge_group:

# Cancel superseded runs for the same PR/branch (saves ~3 min per cancelled run).
# Runs on main and merge queue are never cancelled (each SHA produces a unique group).
concurrency:
  group: ci-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Block PRs to production from non-main branches
        if: github.event_name == 'pull_request' && github.base_ref == 'production'
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          if [[ "$HEAD_REF" != "main" ]]; then
            echo "::error::PRs to production must come from 'main'. Got: '$HEAD_REF'"
            echo "Merge your changes to main first, then the release workflow will open a PR from main → production."
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # --- Security: dependency audit (advisory, non-blocking) ---

      - name: Dependency security audit
        continue-on-error: true
        run: pnpm audit --audit-level=high 2>/dev/null || echo "::warning::Dependency audit found high-severity vulnerabilities — run 'pnpm audit' locally for details"

      # --- Build data (once, shared by all subsequent steps) ---

      - name: Build data
        run: cd apps/web && node --import tsx/esm scripts/build-data.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LONGTERMWIKI_SERVER_URL: ${{ secrets.LONGTERMWIKI_SERVER_URL }}
          LONGTERMWIKI_SERVER_API_KEY: ${{ secrets.LONGTERMWIKI_SERVER_API_KEY }}
          LONGTERMWIKI_PROJECT_KEY: ${{ secrets.LONGTERMWIKI_PROJECT_KEY }}

      # --- Validation (fail fast before expensive Next.js build) ---

      - name: Install actionlint
        run: |
          gh release download --repo rhysd/actionlint --pattern 'actionlint_*_linux_amd64.tar.gz' -O /tmp/actionlint.tar.gz
          tar -xzf /tmp/actionlint.tar.gz -C /usr/local/bin actionlint
        env:
          GH_TOKEN: ${{ github.token }}

      - name: GitHub Actions YAML validation — actionlint (blocking)
        run: npx tsx crux/validate/validate-actions-yaml.ts

      - name: MDX syntax check (blocking)
        run: pnpm crux validate unified --rules=comparison-operators,dollar-signs --errors-only

      - name: YAML schema validation (blocking)
        run: pnpm crux validate schema

      - name: Frontmatter schema validation (blocking)
        run: pnpm crux validate unified --rules=frontmatter-schema --errors-only

      - name: Numeric ID integrity (blocking)
        run: pnpm crux validate unified --rules=numeric-id-integrity --errors-only

      - name: TypeScript type checks (parallel)
        run: |
          pids=()
          (cd apps/web && npx tsc --noEmit) &
          pids+=($!)
          (cd apps/discord-bot && npx tsc --noEmit) &
          pids+=($!)
          (cd apps/wiki-server && npx tsc --noEmit) &
          pids+=($!)
          (cd apps/groundskeeper && npx tsc --noEmit) &
          pids+=($!)
          failed=0
          for pid in "${pids[@]}"; do
            wait "$pid" || failed=1
          done
          exit $failed

      - name: TypeScript type check — crux (advisory, baseline-guarded)
        continue-on-error: true
        run: npx tsx crux/validate/validate-crux-tsc.ts --ci

      - name: .returning() guard check (blocking)
        run: npx tsx crux/validate/validate-returning-guard.ts

      - name: Drizzle migration journal integrity (blocking)
        run: npx tsx crux/validate/validate-drizzle-journal.ts

      - name: Auto-update orchestrator smoke test (dry-run)
        if: "!cancelled()"
        continue-on-error: true
        run: |
          pnpm crux auto-update run --dry-run --skip-fetch --trigger=ci-check --budget=0 --count=0 \
            || echo "::warning::Auto-update dry-run failed (advisory — check orchestrator for regressions)"

      - name: Component reference validation (blocking)
        run: pnpm crux validate refs

      - name: Run validation suite (advisory)
        if: "!cancelled()"
        continue-on-error: true
        run: |
          pnpm crux validate || echo "::warning::Validation has pre-existing failures (non-blocking)"

      # --- Tests ---

      - name: Run tests
        run: cd apps/web && pnpm test

      - name: Run discord-bot tests
        run: cd apps/discord-bot && pnpm test

      - name: Run wiki-server tests
        run: cd apps/wiki-server && pnpm test

      - name: Run crux tests
        run: pnpm test:crux

      # --- Next.js build (most expensive step — runs last) ---

      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: apps/web/.next/cache
          key: nextjs-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('apps/web/src/**', 'content/docs/**') }}
          restore-keys: |
            nextjs-${{ hashFiles('pnpm-lock.yaml') }}-

      - name: Build Next.js
        run: cd apps/web && pnpm build
        env:
          SKIP_PREBUILD: "1"
          LONGTERMWIKI_SERVER_URL: ${{ secrets.LONGTERMWIKI_SERVER_URL }}
          LONGTERMWIKI_SERVER_API_KEY: ${{ secrets.LONGTERMWIKI_SERVER_API_KEY }}
          LONGTERMWIKI_PROJECT_KEY: ${{ secrets.LONGTERMWIKI_PROJECT_KEY }}

  sync-content:
    # Sync wiki page content to wiki-server after build succeeds on main.
    needs: [ci]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build data
        run: cd apps/web && node --import tsx/esm scripts/build-data.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LONGTERMWIKI_SERVER_URL: ${{ secrets.LONGTERMWIKI_SERVER_URL }}
          LONGTERMWIKI_SERVER_API_KEY: ${{ secrets.LONGTERMWIKI_SERVER_API_KEY }}
          LONGTERMWIKI_PROJECT_KEY: ${{ secrets.LONGTERMWIKI_PROJECT_KEY }}

      - name: Sync pages to wiki-server
        run: pnpm crux wiki-server sync
        env:
          LONGTERMWIKI_SERVER_URL: ${{ secrets.LONGTERMWIKI_SERVER_URL }}
          LONGTERMWIKI_SERVER_API_KEY: ${{ secrets.LONGTERMWIKI_SERVER_API_KEY }}
          LONGTERMWIKI_CONTENT_KEY: ${{ secrets.LONGTERMWIKI_CONTENT_KEY }}

  # When CI fails on main, auto-file a GitHub issue labeled for agent pickup.
  # The groundskeeper issue-responder picks up `groundskeeper-autofix` issues
  # and spawns a Claude Code session to fix them automatically.
  file-regression-issue:
    needs: [ci]
    if: failure() && github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: File regression issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Find the merge commit that likely caused the failure
          LAST_MERGE=$(git log --merges --oneline -1 --format="%H %s")
          LAST_SHA=$(echo "$LAST_MERGE" | cut -d' ' -f1)
          LAST_MSG=$(echo "$LAST_MERGE" | cut -d' ' -f2-)

          # Extract PR number from merge commit message if present
          PR_NUM=$(echo "$LAST_MSG" | grep -oE '#[0-9]+' | head -1 | tr -d '#')
          PR_REF=""
          if [ -n "$PR_NUM" ]; then
            PR_REF=" (from PR #${PR_NUM})"
          fi

          TITLE="CI broken on main after ${LAST_SHA:0:7}${PR_REF}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          BODY="## Problem

          CI failed on \`main\` after merging commit \`${LAST_SHA:0:10}\`: ${LAST_MSG}

          Run: ${RUN_URL}

          ## Suggested Fix

          Check the failing CI step in the run above, identify the regression, and fix it.

          ## Acceptance Criteria

          - [ ] CI passes on main
          - [ ] Root cause identified and fixed"
          # Strip leading whitespace from each line (heredoc-style dedent)
          BODY=$(echo "$BODY" | sed 's/^          //')

          # Check for an existing open issue to avoid duplicates
          EXISTING=$(gh issue list --label "groundskeeper-autofix" --state open --limit 5 --json title --jq '.[].title' | grep -c "CI broken on main" || true)
          if [ "$EXISTING" -gt 0 ]; then
            echo "Existing CI-broken issue already open — skipping duplicate."
            exit 0
          fi

          gh issue create --title "$TITLE" --body "$BODY" --label "bug,groundskeeper-autofix"

  # Deploy job removed — production deploys are now handled by the scheduled
  # deploy hook (scheduled-deploy.yml, every hour) instead of per-push.
  # This caps Vercel build minutes at 24/day max vs 50-80/day previously.
  # vercel.json sets github.enabled=false to prevent Vercel from posting
  # PR failure statuses (deploy hooks bypass the GitHub integration).
