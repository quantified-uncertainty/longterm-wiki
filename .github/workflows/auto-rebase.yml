name: Auto-Rebase PRs
run-name: "Auto-Rebase PRs${{ vars.AUTOMATION_PAUSED == 'true' && ' [PAUSED]' || '' }}"

# Rebase all open PRs onto main to surface conflicts early.
# Logic lives in crux/lib/pr-rebase.ts; this workflow is a thin orchestrator.
#
# Safeguards (implemented in TypeScript):
#   1. Skip PRs with the `agent:working` label (agent actively working)
#   2. Skip PRs updated within 30 minutes (active work)
#   3. Skip branches with commits pushed within 30 minutes (active work)
#   4. Skip branches where last commit contains [ci-autofix] (feedback loop)

on:
  schedule:
    - cron: '0 */4 * * *'   # every 4 hours
  workflow_dispatch:          # allow manual trigger

permissions:
  contents: write
  pull-requests: read
  issues: read

concurrency:
  group: auto-rebase
  cancel-in-progress: true

jobs:
  paused-notice:
    uses: ./.github/workflows/_paused-notice.yml

  preflight:
    if: vars.AUTOMATION_PAUSED != 'true'
    runs-on: ubuntu-latest
    steps:
      - run: echo "Automation is active"

  rebase:
    needs: [preflight]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm crux pr rebase-all --verbose
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
