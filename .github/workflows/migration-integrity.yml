name: Migration Integrity Check

on:
  pull_request:
    paths:
      - "apps/wiki-server/drizzle/[0-9]*.sql"
      - "apps/wiki-server/drizzle/meta/_journal.json"

jobs:
  check-migration-integrity:
    name: Check migration file integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for modified migrations
        env:
          MIGRATION_OVERRIDE: ${{ contains(github.event.pull_request.labels.*.name, 'migration-override') }}
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"

          # Get list of migration SQL files that were MODIFIED (not added)
          MODIFIED=$(git diff --name-only --diff-filter=M "$BASE_SHA"...HEAD -- 'apps/wiki-server/drizzle/[0-9]*.sql')

          if [ -n "$MODIFIED" ] && [ "$MIGRATION_OVERRIDE" != "true" ]; then
            echo "::error::The following migration files were modified. Migrations must never be modified after being committed — they may have already been applied to production databases. Create a new migration instead."
            echo ""
            echo "$MODIFIED" | while read -r file; do
              echo "::error file=${file}::${file} was modified. Create a new migration to make changes."
            done
            echo ""
            echo "If you are absolutely certain this migration has not been applied anywhere, you can add the 'migration-override' label to this PR to bypass this check."
            exit 1
          fi

          if [ -n "$MODIFIED" ]; then
            echo "::warning::migration-override label present; skipping modified-migration failure."
          else
            echo "No existing migrations were modified. ✓"
          fi

      - name: Check journal ordering
        run: |
          # Verify _journal.json entries are in strictly increasing idx order
          python3 -c "
          import json, os, sys

          with open('apps/wiki-server/drizzle/meta/_journal.json') as f:
              journal = json.load(f)

          entries = journal['entries']
          errors = []

          # Build set of expected SQL files from journal
          expected_sql_files = set()

          for i, entry in enumerate(entries):
              if entry['idx'] != i:
                  errors.append(f'Entry {i} has idx={entry[\"idx\"]}, expected {i}')

              if i > 0 and entry['when'] <= entries[i-1]['when']:
                  errors.append(f'Entry {i} ({entry[\"tag\"]}) has when={entry[\"when\"]} <= previous entry when={entries[i-1][\"when\"]}')

              # Check that the SQL file exists
              sql_file = f'apps/wiki-server/drizzle/{entry[\"tag\"]}.sql'
              expected_sql_files.add(sql_file)
              if not os.path.exists(sql_file):
                  errors.append(f'Entry {i} references {sql_file} but file does not exist')

          # Reverse check: SQL files in the directory must be in the journal
          actual_sql_files = {
              os.path.join('apps/wiki-server/drizzle', name)
              for name in os.listdir('apps/wiki-server/drizzle')
              if name.endswith('.sql') and name[:4].isdigit()
          }
          for sql_file in sorted(actual_sql_files - expected_sql_files):
              errors.append(f'{sql_file} exists but is not referenced by _journal.json')

          if errors:
              for e in errors:
                  print(f'::error::{e}', file=sys.stderr)
              sys.exit(1)

          print(f'Journal integrity check passed: {len(entries)} entries, all valid. ✓')
          "
