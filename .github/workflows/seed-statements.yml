name: Seed Statements System

# One-time workflow to populate the statements tables after migration 0052/0053.
# Runs seed-properties, migrate-facts-to-statements, and migrate-claims-to-statements
# against the production database.

on:
  workflow_dispatch:
    inputs:
      entity_filter:
        description: >
          Entity filter for claims migration. Use "--all" to migrate all entities,
          or a specific entity slug (e.g., "anthropic"). Default: --all.
        required: false
        type: string
        default: "--all"
      dry_run:
        description: "If true, only run seed-properties (no fact/claim migration)"
        required: false
        type: boolean
        default: false

jobs:
  seed:
    name: Seed statements tables
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Seed properties
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          echo "Seeding properties from data/fact-measures.yaml..."
          cd apps/wiki-server && npx tsx scripts/seed-properties.ts

      - name: Migrate YAML facts to statements
        if: inputs.dry_run != true
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          echo "Migrating YAML facts to statements..."
          cd apps/wiki-server && npx tsx scripts/migrate-facts-to-statements.ts

      - name: Migrate claims to statements
        if: inputs.dry_run != true
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          ENTITY_INPUT="${{ inputs.entity_filter }}"
          if [ "$ENTITY_INPUT" = "--all" ]; then
            echo "Migrating ALL claims to statements..."
            cd apps/wiki-server && npx tsx scripts/migrate-claims-to-statements.ts --all
          else
            echo "Migrating claims for entity: $ENTITY_INPUT"
            cd apps/wiki-server && npx tsx scripts/migrate-claims-to-statements.ts --entity="$ENTITY_INPUT"
          fi

      - name: Verify statements stats
        env:
          LONGTERMWIKI_SERVER_URL: ${{ secrets.LONGTERMWIKI_SERVER_URL }}
          LONGTERMWIKI_SERVER_API_KEY: ${{ secrets.LONGTERMWIKI_SERVER_API_KEY }}
        run: |
          echo "Checking statements stats..."
          STATS=$(curl -sf -H "Authorization: Bearer ${LONGTERMWIKI_SERVER_API_KEY}" \
            "${LONGTERMWIKI_SERVER_URL}/api/statements/stats" 2>&1 || true)
          echo "Stats: $STATS"

          TOTAL=$(echo "$STATS" | jq -r '.total // 0')
          PROPS=$(echo "$STATS" | jq -r '.propertiesCount // 0')
          echo "Total statements: $TOTAL"
          echo "Total properties: $PROPS"

          if [ "$PROPS" -eq 0 ]; then
            echo "::warning::Properties count is 0 — seed-properties may have failed"
          fi
