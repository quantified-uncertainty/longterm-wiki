name: Wiki Server — Dead-Man-Switch

# Weekly dead-man-switch: verifies the groundskeeper daemon is alive and
# actively monitoring wiki-server health. Day-to-day health monitoring is
# handled by the groundskeeper (every 5 min, with incident buffering,
# cooldowns, and auto-close). This workflow exists only to catch the case
# where the groundskeeper itself goes down.
#
# Consolidation: github.com/quantified-uncertainty/longterm-wiki/issues/1477

on:
  schedule:
    - cron: "0 6 * * 1" # every Monday at 06:00 UTC
  workflow_dispatch:

concurrency:
  group: server-health-monitor
  cancel-in-progress: false

jobs:
  dead-man-switch:
    name: Verify monitoring is active
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Check wiki-server and groundskeeper status
        id: check
        env:
          LONGTERMWIKI_SERVER_URL: ${{ secrets.LONGTERMWIKI_SERVER_URL }}
          LONGTERMWIKI_SERVER_API_KEY: ${{ secrets.LONGTERMWIKI_SERVER_API_KEY }}
        run: |
          if [ -z "$LONGTERMWIKI_SERVER_URL" ]; then
            echo "status=error" >> "$GITHUB_OUTPUT"
            echo "error=LONGTERMWIKI_SERVER_URL secret is not set" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # 1. Check if wiki-server is reachable
          HTTP_CODE=$(curl -s -o /tmp/health.json -w "%{http_code}" \
            --max-time 15 "${LONGTERMWIKI_SERVER_URL}/health" 2>/dev/null) || HTTP_CODE="000"

          if [ "$HTTP_CODE" = "000" ] || [ "$HTTP_CODE" != "200" ]; then
            echo "status=server-down" >> "$GITHUB_OUTPUT"
            echo "error=Wiki-server unreachable (HTTP ${HTTP_CODE}). Groundskeeper may also be unable to monitor." >> "$GITHUB_OUTPUT"
            exit 0
          fi

          SERVER_STATUS=$(cat /tmp/health.json | jq -r '.status // "unknown"')
          DB_STATUS=$(cat /tmp/health.json | jq -r '.database // "unknown"')

          if [ "$SERVER_STATUS" != "healthy" ] || [ "$DB_STATUS" != "ok" ]; then
            echo "status=server-unhealthy" >> "$GITHUB_OUTPUT"
            echo "error=Wiki-server is up but unhealthy (status=${SERVER_STATUS}, db=${DB_STATUS}). Groundskeeper should have caught this." >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # 2. Check groundskeeper liveness via monitoring/status
          AUTH_HEADER=""
          if [ -n "$LONGTERMWIKI_SERVER_API_KEY" ]; then
            AUTH_HEADER="Authorization: Bearer ${LONGTERMWIKI_SERVER_API_KEY}"
          fi

          MON_CODE=$(curl -s -o /tmp/monitoring.json -w "%{http_code}" \
            --max-time 15 \
            ${AUTH_HEADER:+-H "$AUTH_HEADER"} \
            "${LONGTERMWIKI_SERVER_URL}/api/monitoring/status" 2>/dev/null) || MON_CODE="000"

          if [ "$MON_CODE" != "200" ]; then
            echo "status=monitoring-unavailable" >> "$GITHUB_OUTPUT"
            echo "error=Monitoring status endpoint unreachable (HTTP ${MON_CODE}). Cannot verify groundskeeper liveness." >> "$GITHUB_OUTPUT"
            exit 0
          fi

          GK_STATUS=$(cat /tmp/monitoring.json | jq -r '.services.groundskeeper.status // "unknown"')

          if [ "$GK_STATUS" = "healthy" ]; then
            echo "status=ok" >> "$GITHUB_OUTPUT"
            echo "groundskeeper_status=${GK_STATUS}" >> "$GITHUB_OUTPUT"
          else
            echo "status=groundskeeper-down" >> "$GITHUB_OUTPUT"
            echo "groundskeeper_status=${GK_STATUS}" >> "$GITHUB_OUTPUT"
            echo "error=Groundskeeper status is '${GK_STATUS}'. Health monitoring may be inactive." >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update issue (monitoring gap detected)
        if: steps.check.outputs.status != 'ok'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHECK_STATUS: ${{ steps.check.outputs.status }}
          CHECK_ERROR: ${{ steps.check.outputs.error }}
        run: |
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M:%S UTC')

          EXISTING=$(gh issue list \
            --repo "${{ github.repository }}" \
            --label "server-health" \
            --state open \
            --json number \
            --jq '.[0].number // empty')

          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" \
              --repo "${{ github.repository }}" \
              --body "[Dead-man-switch] ${TIMESTAMP}: ${CHECK_ERROR}"
          else
            gh label create "server-health" --repo "${{ github.repository }}" \
              --color "d73a4a" --description "Wiki server health monitoring" 2>/dev/null || true

            cat > /tmp/issue_body.md <<ISSUE_BODY
## Dead-man-switch: monitoring gap detected

| Field | Value |
|-------|-------|
| **Check** | ${CHECK_STATUS} |
| **Detected at** | ${TIMESTAMP} |
| **Detail** | ${CHECK_ERROR} |

### What this means

The weekly dead-man-switch detected a potential gap in health monitoring:

- **\`server-down\`** — Wiki-server is unreachable. The groundskeeper should be creating issues for this, but if both are down, this is the fallback alert.
- **\`server-unhealthy\`** — Wiki-server is up but degraded. The groundskeeper should have caught this already — if it didn't, the groundskeeper may be down too.
- **\`groundskeeper-down\`** — Wiki-server is healthy but the groundskeeper daemon hasn't sent a heartbeat recently. Health monitoring is not running.
- **\`monitoring-unavailable\`** — The monitoring status endpoint is not reachable. Cannot verify groundskeeper liveness.
- **\`error\`** — Configuration issue (missing secrets).

### Actions

1. Check groundskeeper pod: \`kubectl get pods -n longtermwiki -l app=groundskeeper\`
2. Check groundskeeper logs: \`kubectl logs -n longtermwiki -l app=groundskeeper --tail=50\`
3. Check wiki-server pod: \`kubectl get pods -n longtermwiki -l app=longterm-wiki-server-wiki-server\`

---
*Created by the [dead-man-switch workflow](https://github.com/quantified-uncertainty/longterm-wiki/actions/workflows/server-health-monitor.yml). Runs weekly to verify the groundskeeper health monitor is active.*
ISSUE_BODY

            gh issue create \
              --repo "${{ github.repository }}" \
              --title "[Dead-man-switch] Monitoring gap: ${CHECK_STATUS}" \
              --label "server-health,bug" \
              --body-file /tmp/issue_body.md
          fi

      - name: Close resolved issue
        if: steps.check.outputs.status == 'ok'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE=$(gh issue list \
            --repo "${{ github.repository }}" \
            --label "server-health" \
            --state open \
            --json number \
            --jq '.[0].number // empty')

          if [ -n "$ISSUE" ]; then
            TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
            gh issue comment "$ISSUE" \
              --repo "${{ github.repository }}" \
              --body "[Dead-man-switch] ${TIMESTAMP}: All clear — wiki-server healthy, groundskeeper active. Auto-closing."
            gh issue close "$ISSUE" \
              --repo "${{ github.repository }}"
          fi
