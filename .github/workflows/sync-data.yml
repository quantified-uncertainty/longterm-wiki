name: Sync Data to Wiki Server
run-name: "Sync Data to Wiki Server${{ vars.AUTOMATION_PAUSED == 'true' && ' [PAUSED]' || '' }}"

on:
  # Session logs and auto-update runs are gitignored (stored in DB),
  # so push-path triggers no longer apply. Use manual dispatch only.
  workflow_dispatch:

# Cancel superseded runs for the same trigger
concurrency:
  group: sync-data-${{ github.sha }}
  cancel-in-progress: true

jobs:
  paused-notice:
    uses: ./.github/workflows/_paused-notice.yml

  preflight:
    # Global circuit breaker — skip when automation is paused or wiki-server is down.
    # Set the AUTOMATION_PAUSED repository variable to 'true' to pause all automated workflows.
    if: vars.AUTOMATION_PAUSED != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check wiki-server health
        run: |
          curl -sf --max-time 10 "${{ secrets.LONGTERMWIKI_SERVER_URL }}/health" || {
            echo "::warning::Wiki-server unreachable — skipping workflow"
            exit 1
          }
          echo "Wiki-server is healthy"

  sync-data:
    needs: [preflight]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync sessions to wiki-server
        run: pnpm crux wiki-server sync-sessions
        env:
          LONGTERMWIKI_SERVER_URL: ${{ secrets.LONGTERMWIKI_SERVER_URL }}
          LONGTERMWIKI_SERVER_API_KEY: ${{ secrets.LONGTERMWIKI_SERVER_API_KEY }}
          LONGTERMWIKI_PROJECT_KEY: ${{ secrets.LONGTERMWIKI_PROJECT_KEY }}

      - name: Sync auto-update runs to wiki-server
        run: pnpm crux wiki-server sync-auto-update-runs
        env:
          LONGTERMWIKI_SERVER_URL: ${{ secrets.LONGTERMWIKI_SERVER_URL }}
          LONGTERMWIKI_SERVER_API_KEY: ${{ secrets.LONGTERMWIKI_SERVER_API_KEY }}
          LONGTERMWIKI_PROJECT_KEY: ${{ secrets.LONGTERMWIKI_PROJECT_KEY }}
