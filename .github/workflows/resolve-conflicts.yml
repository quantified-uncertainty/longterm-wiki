name: Resolve Merge Conflicts
run-name: "Resolve Merge Conflicts${{ vars.AUTOMATION_PAUSED == 'true' && ' [PAUSED]' || '' }}"

# Finds all open PRs with merge conflicts and resolves them using a two-tier
# approach: Tier 1 (Sonnet API) for fast text-level resolution, Tier 2 (Claude
# Code CLI) for agentic escalation when validation fails.
#
# Orchestration logic lives in crux/lib/conflict-resolution.ts.
# The Sonnet conflict resolver script (.github/scripts/resolve-conflicts.mjs)
# handles per-file resolution and is called by the TypeScript orchestrator.
#
# Requires: ANTHROPIC_API_KEY secret in the repository.

on:
  # Automatic triggers are disabled to control Anthropic API spending.
  # Re-enable schedule or workflow_run if you want automated resolution.

  # workflow_run:
  #   workflows: ["Auto-Rebase PRs"]
  #   types: [completed]

  # schedule:
  #   - cron: "0 */6 * * *"

  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

# Only one instance at a time to avoid race conditions
concurrency:
  group: resolve-conflicts
  cancel-in-progress: false

jobs:
  paused-notice:
    uses: ./.github/workflows/_paused-notice.yml

  preflight:
    # Global circuit breaker — skip when automation is paused.
    if: vars.AUTOMATION_PAUSED != 'true'
    runs-on: ubuntu-latest
    steps:
      - run: echo "Automation is active"

  resolve:
    needs: [preflight]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: npm install -g @anthropic-ai/claude-code@latest

      - name: Resolve conflicted PRs
        run: pnpm crux pr resolve-conflicts --verbose
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
