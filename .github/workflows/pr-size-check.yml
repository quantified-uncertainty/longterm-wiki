name: PR Size Check

on:
  pull_request:
    branches: [main]

jobs:
  check-size:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check PR size and comment if large
        uses: actions/github-script@v7
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        with:
          script: |
            const { execSync } = require('child_process');
            const WARN_THRESHOLD = 500;
            const LARGE_THRESHOLD = 1000;

            // Get per-file diff stats, filtering out test/generated/content files.
            // We only count non-test infrastructure additions since large infra PRs
            // correlate with post-merge bugs; test and content PRs are low-risk.
            //
            // Excluded patterns:
            //   *.test.ts / *.test.tsx / *.spec.ts — test files
            //   content/docs/** — MDX wiki content (low risk)
            //   **/*.snap — Jest/Vitest snapshots
            //   apps/web/public/** — static assets
            //   pnpm-lock.yaml — generated lockfile
            const BASE = process.env.BASE_SHA;
            const HEAD = process.env.HEAD_SHA;
            const rawDiff = execSync(
              `git diff --numstat ${BASE}...${HEAD}`,
              { encoding: 'utf-8' }
            );

            const EXCLUDED = [
              /\.test\.[jt]sx?$/,
              /\.spec\.[jt]sx?$/,
              /^content\/docs\//,
              /\.snap$/,
              /^apps\/web\/public\//,
              /^pnpm-lock\.yaml$/,
            ];

            let infraAdditions = 0;
            let totalAdditions = 0;
            let totalDeletions = 0;
            let filesChanged = 0;

            for (const line of rawDiff.trim().split('\n').filter(Boolean)) {
              const [adds, dels, file] = line.split('\t');
              if (!file) continue;
              const addCount = parseInt(adds, 10) || 0;
              const delCount = parseInt(dels, 10) || 0;
              totalAdditions += addCount;
              totalDeletions += delCount;
              filesChanged++;
              const isExcluded = EXCLUDED.some(p => p.test(file));
              if (!isExcluded) {
                infraAdditions += addCount;
              }
            }

            console.log(
              `PR additions: ${totalAdditions} total, ${infraAdditions} non-test/content ` +
              `(${totalDeletions} deletions, ${filesChanged} files)`
            );

            if (infraAdditions <= WARN_THRESHOLD) {
              console.log(`PR size OK: ${infraAdditions} non-test additions (threshold: ${WARN_THRESHOLD})`);
              return;
            }

            // Get PR metadata for the comment
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });

            // Check if we already posted a size warning (avoid duplicates on re-push)
            const MARKER = '<!-- pr-size-check -->';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(MARKER));

            const level = infraAdditions > LARGE_THRESHOLD ? 'large' : 'medium';
            const emoji = level === 'large' ? '🔴' : '🟡';
            const body = [
              MARKER,
              `${emoji} **PR Size Warning**: ${infraAdditions} non-test additions across ${filesChanged} files.`,
              '',
              level === 'large'
                ? `This PR exceeds ${LARGE_THRESHOLD} non-test additions. Consider splitting into smaller, staged PRs (see [#1252](https://github.com/quantified-uncertainty/longterm-wiki/issues/1252)).`
                : `This PR exceeds ${WARN_THRESHOLD} non-test additions. If possible, consider whether it could be split into smaller PRs.`,
              '',
              `_Test files, wiki content, snapshots, and lockfiles are excluded from this count (low-risk additions)._`,
              '',
              `| Metric | Value |`,
              `|--------|-------|`,
              `| Non-test additions | +${infraAdditions} |`,
              `| Total additions | +${totalAdditions} |`,
              `| Deletions | -${totalDeletions} |`,
              `| Files changed | ${filesChanged} |`,
            ].join('\n');

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              console.log(`Updated existing size warning (${infraAdditions} non-test additions)`);
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
              console.log(`Posted size warning (${infraAdditions} non-test additions)`);
            }
