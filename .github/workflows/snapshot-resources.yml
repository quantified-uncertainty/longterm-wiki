name: Refresh Resources Snapshot
run-name: "Refresh Resources Snapshot${{ vars.AUTOMATION_PAUSED == 'true' && ' [PAUSED]' || '' }}"

# Fetches all resources from PG and uploads the snapshot as an artifact.
# The snapshot (data/resources-snapshot.json) is NOT tracked in git to
# avoid ~640MB/year of history bloat. It serves as a local development
# fallback when the wiki-server is unavailable during builds.
#
# To use locally: pnpm crux wiki-server snapshot-resources
# See #2079 for rationale.

on:
  schedule:
    - cron: "30 4 * * *" # daily at 04:30 UTC (after wiki-server export at 04:00)
  workflow_dispatch:

concurrency:
  group: snapshot-resources
  cancel-in-progress: true

jobs:
  paused-notice:
    uses: ./.github/workflows/_paused-notice.yml

  preflight:
    if: vars.AUTOMATION_PAUSED != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check wiki-server health
        run: |
          curl -sf --max-time 10 "${{ secrets.LONGTERMWIKI_SERVER_URL }}/health" || {
            echo "::warning::Wiki-server unreachable — skipping workflow"
            exit 1
          }
          echo "Wiki-server is healthy"

  snapshot:
    needs: [preflight]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Refresh resources snapshot
        run: pnpm crux wiki-server snapshot-resources
        env:
          LONGTERMWIKI_SERVER_URL: ${{ secrets.LONGTERMWIKI_SERVER_URL }}
          LONGTERMWIKI_SERVER_API_KEY: ${{ secrets.LONGTERMWIKI_SERVER_API_KEY }}

      - name: Upload snapshot artifact
        uses: actions/upload-artifact@v4
        with:
          name: resources-snapshot
          path: data/resources-snapshot.json
          retention-days: 30
