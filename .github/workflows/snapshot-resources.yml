name: Refresh Resources Snapshot
run-name: "Refresh Resources Snapshot${{ vars.AUTOMATION_PAUSED == 'true' && ' [PAUSED]' || '' }}"

# Fetches all resources from PG and commits an updated snapshot file.
# The snapshot (data/resources-snapshot.json) serves as an offline/CI
# fallback when the wiki-server is unavailable during builds.

on:
  schedule:
    - cron: "30 4 * * *" # daily at 04:30 UTC (after wiki-server export at 04:00)
  workflow_dispatch:

concurrency:
  group: snapshot-resources
  cancel-in-progress: true

jobs:
  paused-notice:
    uses: ./.github/workflows/_paused-notice.yml

  preflight:
    if: vars.AUTOMATION_PAUSED != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check wiki-server health
        run: |
          curl -sf --max-time 10 "${{ secrets.LONGTERMWIKI_SERVER_URL }}/health" || {
            echo "::warning::Wiki-server unreachable — skipping workflow"
            exit 1
          }
          echo "Wiki-server is healthy"

  snapshot:
    needs: [preflight]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Refresh resources snapshot
        run: pnpm crux wiki-server snapshot-resources
        env:
          LONGTERMWIKI_SERVER_URL: ${{ secrets.LONGTERMWIKI_SERVER_URL }}
          LONGTERMWIKI_SERVER_API_KEY: ${{ secrets.LONGTERMWIKI_SERVER_API_KEY }}

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/resources-snapshot.json
          if git diff --cached --quiet; then
            echo "No changes to snapshot"
          else
            RESOURCE_COUNT=$(node -e "console.log(JSON.parse(require('fs').readFileSync('data/resources-snapshot.json','utf-8')).length)") || RESOURCE_COUNT="unknown"
            git commit -m "chore: refresh resources snapshot (${RESOURCE_COUNT} resources)"
            git push
          fi
