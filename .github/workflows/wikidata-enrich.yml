name: Wikidata Enrichment
run-name: "Wikidata Enrichment${{ vars.AUTOMATION_PAUSED == 'true' && ' [PAUSED]' || '' }}"

# Manual-only workflow to enrich person entities with Wikidata facts.
# Uses `pnpm crux people enrich --source=wikidata --apply` to add
# structured facts (birth year, education, etc.) from Wikidata.
#
# If changes are detected, commits them and opens a PR for review.

on:
  workflow_dispatch:
    inputs:
      entity:
        description: 'Specific person slug (empty = all people)'
        required: false
        default: ''
        type: string
      dry_run:
        description: 'Dry run (preview changes without writing)'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write

# Only one enrichment run at a time
concurrency:
  group: wikidata-enrich
  cancel-in-progress: false

jobs:
  paused-notice:
    uses: ./.github/workflows/_paused-notice.yml

  enrich:
    if: vars.AUTOMATION_PAUSED != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Wikidata enrichment
        env:
          INPUT_ENTITY: ${{ inputs.entity }}
          INPUT_DRY_RUN: ${{ inputs.dry_run }}
        run: |
          ARGS="--source=wikidata"

          if [ "$INPUT_DRY_RUN" = "true" ]; then
            ARGS="$ARGS --dry-run"
          else
            ARGS="$ARGS --apply"
          fi

          if [ -n "$INPUT_ENTITY" ]; then
            ARGS="$ARGS --entity=$INPUT_ENTITY"
          fi

          echo "Running: pnpm crux people enrich $ARGS"
          pnpm crux people enrich $ARGS

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Changes detected:"
            git diff --stat
          fi

      - name: Create PR with changes
        if: steps.changes.outputs.has_changes == 'true' && inputs.dry_run != true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_ENTITY: ${{ inputs.entity }}
        run: |
          DATE=$(date +%Y-%m-%d)
          BRANCH="auto/wikidata-enrich-${DATE}-${GITHUB_RUN_NUMBER}"

          git checkout -b "$BRANCH"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Only stage expected output files
          git add -- 'packages/kb/data/things/*.yaml'

          # Warn about any other modifications
          OTHER_CHANGES=$(git diff --name-only | grep -v '^packages/kb/data/things/' || true)
          if [ -n "$OTHER_CHANGES" ]; then
            echo "::warning::Unexpected modifications detected (not staged): $OTHER_CHANGES"
          fi

          git commit -m "data: enrich person entities with Wikidata facts ($DATE)"
          git push -u origin "$BRANCH"

          if [ -n "$INPUT_ENTITY" ]; then
            SCOPE_NOTE="Scope: \`$INPUT_ENTITY\` only"
          else
            SCOPE_NOTE="Scope: all person entities"
          fi

          gh pr create \
            --title "Wikidata enrichment $DATE" \
            --body "## Summary
          - Enriched person entities with structured facts from Wikidata
          - $SCOPE_NOTE
          - Facts added: birth year (P569), education (P69)

          Auto-generated by the Wikidata Enrichment workflow (run #${GITHUB_RUN_NUMBER})." \
            --base main
