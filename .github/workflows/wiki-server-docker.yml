name: Wiki Server — Build, Deploy & Scan

on:
  push:
    branches: [main]
    paths:
      - "apps/wiki-server/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/wiki-server-docker.yml"
      - ".github/workflows/database-backup.yml"
  workflow_dispatch:

concurrency:
  group: wiki-server-docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    name: Build & push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/quantified-uncertainty/longterm-wiki-server
          tags: |
            type=raw,value=main,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=long

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/wiki-server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=wiki-server
          cache-to: type=gha,scope=wiki-server,mode=max

  pre-deploy-smoke-test:
    name: Pre-deploy smoke test
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Start container and run smoke test
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          LONGTERMWIKI_SERVER_API_KEY: ${{ secrets.LONGTERMWIKI_SERVER_API_KEY }}
        run: |
          IMAGE="ghcr.io/quantified-uncertainty/longterm-wiki-server:sha-${{ github.sha }}"
          CONTAINER_NAME="smoke-test-${{ github.run_id }}"
          echo "Starting pre-deploy smoke test for image: $IMAGE"

          # Start container with production DATABASE_URL so migrations run against
          # the real schema. Migrations are idempotent (already-applied migrations are
          # skipped), so this is safe. The container is isolated and torn down
          # immediately after the test — no traffic is routed to it.
          docker run -d \
            --name "$CONTAINER_NAME" \
            -p 3099:3100 \
            -e DATABASE_URL="${DATABASE_URL}" \
            -e WIKI_SERVER_API_KEY="${LONGTERMWIKI_SERVER_API_KEY}" \
            "$IMAGE"

          # Wait for the server to be ready (up to 30s: 10 attempts × 3s delay).
          # The server runs migrations on startup, so allow time for that.
          MAX_ATTEMPTS=10
          DELAY=3
          STATUS=""
          for i in $(seq 1 $MAX_ATTEMPTS); do
            HEALTH=$(curl -sf "http://localhost:3099/health" 2>&1 || true)
            STATUS=$(echo "$HEALTH" | jq -r '.status // empty' 2>/dev/null || true)
            if [ "$STATUS" = "healthy" ]; then
              echo "Pre-deploy health check passed on attempt $i: $HEALTH"
              break
            fi
            echo "Pre-deploy health check attempt $i/$MAX_ATTEMPTS: ${HEALTH:-no response}"
            if [ "$i" -lt "$MAX_ATTEMPTS" ]; then
              sleep $DELAY
            fi
          done

          # Always clean up the container regardless of test outcome.
          echo "Stopping and removing smoke-test container..."
          docker stop "$CONTAINER_NAME" || true
          docker rm "$CONTAINER_NAME" || true

          if [ "$STATUS" != "healthy" ]; then
            echo "::error::Pre-deploy smoke test failed — container did not become healthy within $((MAX_ATTEMPTS * DELAY))s. Aborting deploy to prevent serving broken traffic."
            exit 1
          fi

          echo "Pre-deploy smoke test passed — container is healthy. Proceeding with deploy."

  pre-deploy-backup:
    name: Pre-deploy database backup
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    uses: ./.github/workflows/database-backup.yml
    with:
      backup_prefix: pre-deploy
    secrets: inherit

  deploy:
    name: Deploy to ArgoCD
    needs: [build-and-push, pre-deploy-smoke-test, pre-deploy-backup]
    if: github.ref == 'refs/heads/main' && !cancelled()
    # Deploy proceeds even if backup fails (DATABASE_URL may not be configured yet).
    # Once DATABASE_URL is added, backup failures will be visible but non-blocking.
    # Pre-deploy smoke test failure DOES block the deploy (job dependency enforces this).
    runs-on: ubuntu-latest

    steps:
      - name: Update ArgoCD image tag
        env:
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
        run: |
          IMAGE_TAG="sha-${{ github.sha }}"
          echo "Deploying image tag: $IMAGE_TAG"

          ARGOCD_VERSION="v3.3.1"
          curl -sSL -o /usr/local/bin/argocd \
            "https://github.com/argoproj/argo-cd/releases/download/${ARGOCD_VERSION}/argocd-linux-amd64"
          chmod +x /usr/local/bin/argocd

          argocd app set longterm-wiki-server \
            --helm-set image.tag="${IMAGE_TAG}" \
            --auth-token "${ARGOCD_AUTH_TOKEN}" \
            --server "${ARGOCD_SERVER}" \
            --grpc-web

          argocd app wait longterm-wiki-server \
            --health \
            --timeout 300 \
            --auth-token "${ARGOCD_AUTH_TOKEN}" \
            --server "${ARGOCD_SERVER}" \
            --grpc-web

      - name: Verify deployed SHA
        env:
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
        run: |
          EXPECTED_TAG="sha-${{ github.sha }}"
          echo "Expected image tag: ${EXPECTED_TAG}"

          # ArgoCD reconciliation and K8s pod rollout can lag behind `argocd app wait`.
          # Old pods may still appear in status.summary.images for 10-30s after wait
          # returns. Retry up to 5 times (50s total) before declaring failure.
          MAX_ATTEMPTS=5
          DELAY=10
          VERIFIED=false

          for i in $(seq 1 $MAX_ATTEMPTS); do
            APP_JSON=$(argocd app get longterm-wiki-server \
              --refresh \
              --output json \
              --auth-token "${ARGOCD_AUTH_TOKEN}" \
              --server "${ARGOCD_SERVER}" \
              --grpc-web 2>&1 || true)

            IMAGES=$(echo "$APP_JSON" | jq -r '.status.summary.images[] // empty' 2>/dev/null || true)
            SYNC_STATUS=$(echo "$APP_JSON" | jq -r '.status.sync.status // empty' 2>/dev/null || true)
            HEALTH_STATUS=$(echo "$APP_JSON" | jq -r '.status.health.status // empty' 2>/dev/null || true)

            echo "Attempt $i/$MAX_ATTEMPTS — images: ${IMAGES:-<none>} | sync: ${SYNC_STATUS} | health: ${HEALTH_STATUS}"

            if echo "$IMAGES" | grep -q "${EXPECTED_TAG}"; then
              echo "SHA verification passed: ${EXPECTED_TAG} is running"
              VERIFIED=true
              break
            fi

            if [ "$i" -lt "$MAX_ATTEMPTS" ]; then
              echo "Tag not yet visible, waiting ${DELAY}s..."
              sleep $DELAY
            fi
          done

          if [ "$VERIFIED" != "true" ]; then
            echo "::error::SHA verification failed after $MAX_ATTEMPTS attempts! Expected ${EXPECTED_TAG} but saw: ${IMAGES:-<no images>}"
            exit 1
          fi

          echo "Sync status: ${SYNC_STATUS}"
          echo "Health status: ${HEALTH_STATUS}"

      - name: Post-deploy smoke test
        id: post-deploy-smoke
        env:
          LONGTERMWIKI_SERVER_URL: ${{ secrets.LONGTERMWIKI_SERVER_URL }}
          LONGTERMWIKI_SERVER_API_KEY: ${{ secrets.LONGTERMWIKI_SERVER_API_KEY }}
        run: |
          echo "Running post-deploy smoke test..."

          # 1. Health check — retry up to 6 times (90s total) to allow for
          #    pod startup, migration execution, and K8s readiness propagation.
          MAX_ATTEMPTS=6
          DELAY=15
          HEALTH=""
          STATUS=""
          for i in $(seq 1 $MAX_ATTEMPTS); do
            HEALTH=$(curl -sf "${LONGTERMWIKI_SERVER_URL}/health" 2>&1 || true)
            STATUS=$(echo "$HEALTH" | jq -r '.status // empty' 2>/dev/null || true)
            if [ "$STATUS" = "healthy" ]; then
              echo "Health check passed on attempt $i: $HEALTH"
              break
            fi
            echo "Health check attempt $i/$MAX_ATTEMPTS: ${HEALTH:-no response}"
            if [ "$i" -lt "$MAX_ATTEMPTS" ]; then
              sleep $DELAY
            fi
          done
          if [ "$STATUS" != "healthy" ]; then
            echo "::error::Health check failed after $MAX_ATTEMPTS attempts: $HEALTH"
            exit 1
          fi

          # 2. Sync smoke test — send a single dummy page to verify the sync endpoint works end-to-end
          SYNC_BODY='{"pages":[{"id":"__smoke-test__","numericId":null,"title":"Smoke Test","description":null,"llmSummary":null,"category":null,"subcategory":null,"entityType":null,"tags":null,"quality":null,"readerImportance":null,"researchImportance":null,"tacticalValue":null,"backlinkCount":null,"riskCategory":null,"dateCreated":null,"recommendedScore":null,"clusters":null,"hallucinationRiskLevel":null,"hallucinationRiskScore":null,"contentPlaintext":null,"wordCount":null,"lastUpdated":null,"contentFormat":null}]}'
          SYNC_RESPONSE=$(curl -sf -X POST \
            -H "Authorization: Bearer ${LONGTERMWIKI_SERVER_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$SYNC_BODY" \
            "${LONGTERMWIKI_SERVER_URL}/api/pages/sync")
          UPSERTED=$(echo "$SYNC_RESPONSE" | jq -r '.upserted')
          if [ "$UPSERTED" != "1" ]; then
            echo "::error::Sync smoke test failed: $SYNC_RESPONSE"
            exit 1
          fi
          echo "Sync smoke test passed: upserted=$UPSERTED"

          # 3. Cleanup — delete the smoke-test row so it does not persist in the database
          DELETE_RESPONSE=$(curl -sf -X DELETE \
            -H "Authorization: Bearer ${LONGTERMWIKI_SERVER_API_KEY}" \
            "${LONGTERMWIKI_SERVER_URL}/api/pages/__smoke-test__")
          DELETED=$(echo "$DELETE_RESPONSE" | jq -r '.deleted')
          if [ "$DELETED" != "1" ]; then
            echo "::error::Smoke test cleanup failed: $DELETE_RESPONSE"
            exit 1
          fi
          echo "Smoke test cleanup passed: deleted=$DELETED"

          # 4. Resources stats smoke test — verifies the resources endpoint is reachable
          #    and returns expected shape (catches schema/migration issues like the 0026/0027 gap)
          #    Retries up to 3 times with backoff to handle transient rate limits (429).
          TOTAL_RESOURCES=""
          for i in 1 2 3; do
            RESOURCES_RESPONSE=$(curl -s -w "\n%{http_code}" \
              -H "Authorization: Bearer ${LONGTERMWIKI_SERVER_API_KEY}" \
              "${LONGTERMWIKI_SERVER_URL}/api/resources/stats" 2>&1 || true)
            HTTP_CODE=$(echo "$RESOURCES_RESPONSE" | tail -1)
            BODY=$(echo "$RESOURCES_RESPONSE" | sed '$d')
            TOTAL_RESOURCES=$(echo "$BODY" | jq -r '.totalResources // empty' 2>/dev/null || true)
            if [ -n "$TOTAL_RESOURCES" ]; then break; fi
            echo "Resources stats attempt $i/3 failed (HTTP $HTTP_CODE): $BODY"
            if [ "$i" -lt 3 ]; then sleep $((i * 5)); fi
          done
          if [ -z "$TOTAL_RESOURCES" ]; then
            echo "::error::Resources stats smoke test failed after 3 attempts (HTTP $HTTP_CODE): $BODY"
            exit 1
          fi
          echo "Resources stats smoke test passed: totalResources=$TOTAL_RESOURCES"

          # 5. Citations endpoint smoke test — verifies citation_content.resource_id column exists
          #    (catches missing migration 0026 which adds that column)
          CITATIONS_RESPONSE=$(curl -s \
            "${LONGTERMWIKI_SERVER_URL}/api/citations/health/__smoke-test__" 2>&1 || true)
          # A non-existent page returns {"total":0,...} — that's fine; a 500 means column is missing
          if echo "$CITATIONS_RESPONSE" | grep -qi "column\|error\|exception" 2>/dev/null; then
            echo "::error::Citations health smoke test returned an error: $CITATIONS_RESPONSE"
            exit 1
          fi
          echo "Citations health smoke test passed"

      - name: Rollback on post-deploy smoke test failure
        if: failure() && steps.post-deploy-smoke.conclusion == 'failure'
        env:
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
        run: |
          echo "::warning::Post-deploy smoke test failed — triggering ArgoCD rollback to previous revision."

          # ArgoCD CLI was already installed in the Update ArgoCD image tag step.
          # Re-download here since each step runs in a fresh shell context.
          ARGOCD_VERSION="v3.3.1"
          curl -sSL -o /usr/local/bin/argocd \
            "https://github.com/argoproj/argo-cd/releases/download/${ARGOCD_VERSION}/argocd-linux-amd64"
          chmod +x /usr/local/bin/argocd

          # Roll back to the previous deployed revision (revision 0 = previous in ArgoCD).
          argocd app rollback longterm-wiki-server \
            --auth-token "${ARGOCD_AUTH_TOKEN}" \
            --server "${ARGOCD_SERVER}" \
            --grpc-web

          # Wait for rollback to complete and become healthy.
          argocd app wait longterm-wiki-server \
            --health \
            --timeout 300 \
            --auth-token "${ARGOCD_AUTH_TOKEN}" \
            --server "${ARGOCD_SERVER}" \
            --grpc-web

          echo "::error::Rollback completed. Post-deploy smoke test failed — the bad image was NOT promoted to stable traffic. Investigate the failure in the smoke test step above."
          # Exit non-zero so the overall job is marked failed and the team is notified.
          exit 1

  security-scan:
    name: Security scan
    needs: build-and-push
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.30.0
        with:
          image-ref: ghcr.io/quantified-uncertainty/longterm-wiki-server:sha-${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
