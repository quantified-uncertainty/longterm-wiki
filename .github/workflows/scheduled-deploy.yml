name: Scheduled Main Deploy

on:
  schedule:
    - cron: '0 * * * *'    # Every hour, on the hour
  workflow_dispatch:

jobs:
  paused-notice:
    uses: ./.github/workflows/_paused-notice.yml

  trigger-main-deploy:
    if: vars.AUTOMATION_PAUSED != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Trigger Vercel main deployment
        run: |
          if [ -z "${{ secrets.VERCEL_MAIN_DEPLOY_HOOK_URL }}" ]; then
            echo "::error::VERCEL_MAIN_DEPLOY_HOOK_URL secret is not set."
            echo "Go to Vercel Dashboard → Project → Settings → Git → Deploy Hooks"
            echo "Create a hook for Branch 'main', then add the URL as a GitHub secret."
            exit 1
          fi

          RESPONSE=$(curl -s -o /tmp/vercel_response.json -w "%{http_code}" \
            -X POST "${{ secrets.VERCEL_MAIN_DEPLOY_HOOK_URL }}")

          echo "HTTP status: $RESPONSE"
          cat /tmp/vercel_response.json

          if [ "$RESPONSE" -ge 200 ] && [ "$RESPONSE" -lt 300 ]; then
            echo "Main deployment triggered."
          else
            echo "::error::Vercel deploy hook returned HTTP $RESPONSE"
            exit 1
          fi

      - name: Log deploy trigger
        if: always()
        run: |
          echo "## Scheduled Main Deploy" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Time:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          if [ -f /tmp/vercel_response.json ]; then
            JOB_ID=$(cat /tmp/vercel_response.json | grep -o '"id":"[^"]*"' | head -1 | cut -d'"' -f4 || echo "unknown")
            echo "- **Vercel job:** $JOB_ID" >> $GITHUB_STEP_SUMMARY
          fi
