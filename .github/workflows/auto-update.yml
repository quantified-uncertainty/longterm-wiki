name: Auto-Update Wiki
run-name: "Auto-Update Wiki${{ vars.AUTOMATION_PAUSED == 'true' && ' [PAUSED]' || '' }}"

# News-driven automatic wiki update system.
# All pipeline logic lives in `crux/auto-update/ci-orchestrate.ts`.
# This workflow handles only: trigger, permissions, setup, and the single crux call.

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      budget:
        description: 'Max budget in dollars'
        required: false
        default: '30'
        type: string
      count:
        description: 'Max pages to update'
        required: false
        default: '3'
        type: string
      dry_run:
        description: 'Dry run (no page improvements)'
        required: false
        default: false
        type: boolean
      sources:
        description: 'Comma-separated source IDs (empty = all)'
        required: false
        default: ''
        type: string

permissions:
  contents: write
  pull-requests: write

# Only one auto-update run at a time
concurrency:
  group: auto-update
  cancel-in-progress: false

jobs:
  paused-notice:
    if: vars.AUTOMATION_PAUSED == 'true'
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "::warning::AUTOMATION_PAUSED is set — this workflow was skipped. To resume, run: pnpm crux ci unpause-automation"

  preflight:
    # Global circuit breaker — skip when automation is paused or wiki-server is down.
    if: vars.AUTOMATION_PAUSED != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check wiki-server health
        run: |
          curl -sf --max-time 10 "${{ secrets.LONGTERMWIKI_SERVER_URL }}/health" || {
            echo "::warning::Wiki-server unreachable — skipping workflow"
            exit 1
          }
          echo "Wiki-server is healthy"

  auto-update:
    needs: [preflight]
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build data layer
        run: cd apps/web && node --import tsx/esm scripts/build-data.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LONGTERMWIKI_SERVER_URL: ${{ secrets.LONGTERMWIKI_SERVER_URL }}
          LONGTERMWIKI_SERVER_API_KEY: ${{ secrets.LONGTERMWIKI_SERVER_API_KEY }}
          LONGTERMWIKI_PROJECT_KEY: ${{ secrets.LONGTERMWIKI_PROJECT_KEY }}
          LONGTERMWIKI_CONTENT_KEY: ${{ secrets.LONGTERMWIKI_CONTENT_KEY }}

      - name: Restore auto-update state
        uses: actions/cache/restore@v4
        with:
          path: data/auto-update/state.yaml
          key: auto-update-state-${{ github.run_id }}
          restore-keys: |
            auto-update-state-

      - name: Run auto-update CI pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          SCRY_API_KEY: ${{ secrets.SCRY_API_KEY }}
          FIRECRAWL_KEY: ${{ secrets.FIRECRAWL_KEY }}
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARGS="--budget=${{ inputs.budget || '30' }} --count=${{ inputs.count || '5' }} --verbose"

          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi

          if [ -n "${{ inputs.sources }}" ]; then
            ARGS="$ARGS --sources=${{ inputs.sources }}"
          fi

          echo "Running: pnpm crux auto-update run-ci $ARGS"
          pnpm crux auto-update run-ci $ARGS

      - name: Save auto-update state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/auto-update/state.yaml
          key: auto-update-state-${{ github.run_id }}
