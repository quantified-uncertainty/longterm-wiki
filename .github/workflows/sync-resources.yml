name: Sync Resources

on:
  push:
    branches: [production]
    paths:
      - "data/resources/**"

  # Allow manual trigger for full re-sync
  workflow_dispatch:

# Cancel superseded runs for the same trigger
concurrency:
  group: sync-resources-${{ github.sha }}
  cancel-in-progress: true

jobs:
  preflight:
    # Global circuit breaker — skip when automation is paused or wiki-server is down.
    # Set the AUTOMATION_PAUSED repository variable to 'true' to pause all automated workflows.
    if: vars.AUTOMATION_PAUSED != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check wiki-server health
        run: |
          curl -sf --max-time 10 "${{ secrets.LONGTERMWIKI_SERVER_URL }}/health" || {
            echo "::warning::Wiki-server unreachable — skipping workflow"
            exit 1
          }
          echo "Wiki-server is healthy"

  sync-resources:
    needs: [preflight]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate resource schemas
        run: pnpm crux validate schema

      - name: Sync resources to wiki-server
        run: pnpm crux wiki-server sync-resources
        env:
          LONGTERMWIKI_SERVER_URL: ${{ secrets.LONGTERMWIKI_SERVER_URL }}
          LONGTERMWIKI_SERVER_API_KEY: ${{ secrets.LONGTERMWIKI_SERVER_API_KEY }}
          LONGTERMWIKI_CONTENT_KEY: ${{ secrets.LONGTERMWIKI_CONTENT_KEY }}
