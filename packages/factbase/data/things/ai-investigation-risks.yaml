  type: risk
  name: AI-Powered Investigation Risks
  numericId: E694
facts:
  - id: f_nzj4H6QYCQ
    property: description
    value: AI dramatically lowers the bar for investigative discovery by connecting publicly available information at scale.
      This dual-use capability benefits accountability (corruption detection, fraud investigation, OSINT journalism)
      while threatening privacy as "privacy through obscurity" erodes. LLMs automate deanonymization, the mosaic effect
      enables identification from individually innocuous data points, and chilling effects on speech and association
      intensify as investigation costs approach zero.
    asOf: 2026-03
    notes: Migrated from old entity system
