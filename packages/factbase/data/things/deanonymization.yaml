    value: AI dramatically lowers the cost and skill required to identify individuals from supposedly anonymous data.
      Research shows 99.98% of Americans are re-identifiable from 15 demographic attributes, and GPT-4 can infer
      personal attributes from Reddit posts with 85% accuracy at $0.15 per profile. AI transforms deanonymization from a
      specialist skill into a commodity capability, threatening pseudonymity and enabling targeted harassment,
      discrimination, and political repression.
