      url: https://funds.effectivealtruism.org/funds/far-future
      notes: "Core regranting program; 14 payout rounds. ~$10M to AI safety, ~$3M to biosecurity, ~$4M to EA community building. Median grant $25K. 19.3% acceptance rate (2023). Annual volume: $500K (2017) → $6.67M (2023) → ~$8M (2024). Fund managers include Lawrence Chan (METR), Thomas Larsen (AI Futures Project), Oliver Habryka (Lightcone)"

