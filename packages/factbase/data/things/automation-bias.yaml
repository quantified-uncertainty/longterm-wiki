    value: Automation bias is the tendency to over-trust automated systems and AI outputs, accepting their conclusions
      without appropriate scrutiny. Humans are prone to defer to systems that appear authoritative, especially when
      those systems are usually right. This creates vulnerability when systems are wrong.
