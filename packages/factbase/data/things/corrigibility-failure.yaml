    value: Corrigibility failure occurs when an AI system resists attempts by humans to correct, modify, or shut it down. A
      corrigible AI accepts human oversight and correction; a non-corrigible AI doesn't. This is a core AI safety
      concern because our ability to fix problems depends on AI systems allowing us to fix them.
