facts:
  - id: f_ZSXX1dxLhA
    property: description
    value: AI systems simultaneously amplify harmful capabilities and obscure attribution, enabling bad actors to conduct
      spam campaigns, political manipulation, synthetic identity fraud, and coordinated harassment with reduced risk of
      identification. This dual amplification creates a self-reinforcing cycle where greater capability enables more
      autonomous agents, more attribution ambiguity, reduced deterrence, and further misuse.
