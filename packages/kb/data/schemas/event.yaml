type: event
name: Event

required: []
# Events vary widely; no properties are universally required.

recommended:
  - description
  - event-date
  - event-type
  - event-location
  - event-organizers
  - related-entities

items:
  key-outcomes:
    description: "Significant outcomes or consequences of this event"
    fields:
      description: { type: text, required: true, description: "Outcome description" }
      date: { type: date, description: "Date of the outcome (YYYY or YYYY-MM)" }
      source: { type: text, description: "URL to supporting evidence" }
      notes: { type: text, description: "Context or long-term impact" }

  participants:
    description: "Key individuals or organizations involved in this event"
    fields:
      entity: { type: ref, required: true, description: "Thing ID of the participant" }
      role: { type: text, description: "Their role in the event" }
      source: { type: text, description: "URL confirming participation" }
      notes: { type: text, description: "Context about their involvement" }

  timeline:
    description: "Chronological sequence of key moments within this event"
    fields:
      date: { type: date, required: true, description: "Date of the moment (YYYY-MM-DD or YYYY-MM)" }
      event: { type: text, required: true, description: "Brief description of what happened" }
      source: { type: text, description: "URL to news article or primary source" }
      notes: { type: text, description: "Additional context or significance" }
