type: policy
name: Policy

required: []
# Policies vary widely; no properties are universally required.

recommended:
  - description
  - policy-status
  - policy-type
  - jurisdiction
  - enacted-date
  - sponsoring-body
  - related-risks

items:
  key-provisions:
    description: "Major provisions or requirements of this policy"
    fields:
      description: { type: text, required: true, description: "Provision description" }
      status: { type: text, description: "Implementation status (proposed, enacted, enforced, expired)" }
      source: { type: text, description: "URL to the provision text or analysis" }
      notes: { type: text, description: "Context, scope, or enforcement details" }

  affected-entities:
    description: "Organizations or groups affected by this policy"
    fields:
      entity: { type: ref, required: true, description: "Thing ID of the affected entity" }
      impact: { type: text, description: "How this entity is affected" }
      source: { type: text, description: "URL to impact analysis" }
      notes: { type: text, description: "Context or compliance status" }

  legislative-history:
    description: "Key dates and milestones in the policy's legislative or regulatory process"
    fields:
      date: { type: date, required: true, description: "Date of the milestone (YYYY-MM-DD or YYYY-MM)" }
      event: { type: text, required: true, description: "What happened (introduced, amended, passed, signed, enforced)" }
      source: { type: text, description: "URL to official record or news coverage" }
      notes: { type: text, description: "Context, vote counts, or amendments" }
