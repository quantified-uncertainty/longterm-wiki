type: ai-model
name: AI Model

required:
  - developed-by
  - model-release-date

recommended:
  - parameter-count
  - context-window
  - modality
  - model-family
  - license-type
  - training-compute

items:
  benchmark-results:
    description: "Performance results on standard AI benchmarks"
    fields:
      benchmark: { type: text, required: true, description: "Benchmark name (e.g., MMLU, HumanEval, MATH)" }
      score: { type: number, required: true, description: "Score achieved (percentage or raw)" }
      date: { type: date, description: "Date the evaluation was run (YYYY-MM)" }
      source: { type: text, description: "URL to evaluation report or paper" }
      notes: { type: text, description: "Context, caveats, or comparison details" }

  capability-highlights:
    description: "Notable capabilities or performance characteristics of the model"
    fields:
      capability: { type: text, required: true, description: "Capability name or area" }
      description: { type: text, required: true, description: "Description of the capability" }
      source: { type: text, description: "URL to demonstration or paper" }
      notes: { type: text, description: "Context or comparison to prior models" }

  safety-evaluations:
    description: "Safety evaluations and red-teaming results for this model"
    fields:
      evaluation: { type: text, required: true, description: "Evaluation name or type" }
      result: { type: text, required: true, description: "Result or safety level (e.g., ASL-2, low-risk)" }
      date: { type: date, description: "Date of evaluation (YYYY-MM)" }
      source: { type: text, description: "URL to evaluation report" }
      notes: { type: text, description: "Key findings or implications" }
