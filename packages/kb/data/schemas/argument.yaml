type: argument
name: Argument

required: []
# Arguments vary widely; no properties are universally required.

recommended:
  - description
  - evidence-strength
  - expert-consensus-level
  - related-entities

items:
  premises:
    description: "Key premises supporting this argument"
    fields:
      description: { type: text, required: true, description: "Premise description" }
      support-level: { type: text, description: "How well-supported: strong / moderate / weak / contested" }
      source: { type: text, description: "URL to supporting evidence" }
      notes: { type: text, description: "Context or caveats" }

  counterarguments:
    description: "Notable counterarguments or objections"
    fields:
      description: { type: text, required: true, description: "Counterargument description" }
      source: { type: text, description: "URL to the counterargument source" }
      notes: { type: text, description: "Context, strength of objection, or rebuttals" }
