type: concept
name: Concept

required: []
# General-purpose schema for concepts that don't fit other entity types.

recommended:
  - description
  - expert-consensus-level
  - evidence-strength
  - time-horizon
  - research-consensus
  - publication-date
  - related-risks
  - related-entities
  - open-questions

items:
  key-definitions:
    description: "Important definitions or framings of this concept from key sources"
    fields:
      source: { type: text, required: true, description: "Author, organization, or document defining this concept" }
      definition: { type: text, required: true, description: "The definition or framing" }
      url: { type: text, description: "URL to the source" }
      notes: { type: text, description: "Context or how this definition differs from others" }

  related-concepts:
    description: "Closely related concepts with descriptions of the relationship"
    fields:
      concept: { type: text, required: true, description: "Related concept name" }
      relationship: { type: text, required: true, description: "How it relates (e.g., subset-of, contrast-with, precursor-to)" }
      notes: { type: text, description: "Context about the relationship" }
