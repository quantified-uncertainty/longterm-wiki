type: approach
name: AI Safety Approach

required: []
# Approaches vary widely; no properties are universally applicable.

recommended:
  - intervention-type
  - maturity-level
  - time-horizon
  - tractability
  - evidence-strength
  - expert-consensus-level

items:
  key-researchers:
    description: "People leading or significantly contributing to this approach"
    fields:
      person: { type: ref, required: true, description: "Thing ID of the researcher" }
      role: { type: text, description: "Their role or contribution (e.g., pioneer, critic, implementer)" }
      organization: { type: text, description: "Their affiliated organization" }
      source: { type: text, description: "URL confirming the association" }
      notes: { type: text, description: "Context about their contribution" }

  key-papers:
    description: "Foundational or significant papers for this approach"
    fields:
      title: { type: text, required: true, description: "Paper title" }
      authors: { type: text, description: "Author(s) — comma-separated or abbreviated" }
      year: { type: number, required: true, description: "Publication year" }
      url: { type: text, description: "URL to paper (arXiv, DOI, etc.)" }
      notes: { type: text, description: "Significance, key findings, or citation context" }

  implementations:
    description: "Real-world implementations or deployments of this approach"
    fields:
      name: { type: text, required: true, description: "Implementation name or description" }
      organization: { type: text, description: "Organization implementing it" }
      date: { type: date, description: "Date of deployment or announcement (YYYY-MM)" }
      source: { type: text, description: "URL to announcement or documentation" }
      notes: { type: text, description: "Scale, results, or current status" }

  limitations:
    description: "Known limitations, criticisms, or failure modes of this approach"
    fields:
      limitation: { type: text, required: true, description: "Limitation name or description" }
      severity: { type: text, description: "Severity: critical / significant / minor / contested" }
      source: { type: text, description: "URL to supporting analysis or critique" }
      notes: { type: text, description: "Context, counterarguments, or mitigation strategies" }
