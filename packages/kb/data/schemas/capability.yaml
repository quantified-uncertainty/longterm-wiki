type: capability
name: AI Capability

required: []
# Capabilities are descriptive; no properties are universally required.

recommended:
  - maturity-level
  - evidence-strength
  - expert-consensus-level
  - time-horizon

items:
  demonstrations:
    description: "Notable demonstrations or benchmarks for this capability"
    fields:
      name: { type: text, required: true, description: "Demonstration or benchmark name" }
      model: { type: text, description: "AI model or system demonstrating this capability" }
      date: { type: date, description: "Date of demonstration (YYYY-MM)" }
      source: { type: text, required: true, description: "URL to demonstration or paper" }
      notes: { type: text, description: "Performance details, caveats, or significance" }

  safety-implications:
    description: "Safety-relevant implications of this capability"
    fields:
      implication: { type: text, required: true, description: "Safety implication description" }
      risk-type: { type: text, description: "Risk category: misuse / misalignment / structural / oversight" }
      severity: { type: text, description: "Severity: catastrophic / severe / moderate / minor" }
      source: { type: text, description: "URL to analysis" }
      notes: { type: text, description: "Context, current mitigations, or open questions" }
