properties:

  # ── Financial ────────────────────────────────────────────────

  revenue:
    name: Revenue
    description: "Annualized run-rate revenue (ARR) or trailing twelve-month revenue"
    dataType: number
    unit: USD
    category: financial
    temporal: true
    appliesTo: [organization]
    display:
      divisor: 1e9
      prefix: "$"
      suffix: "B"

  valuation:
    name: Valuation
    description: "Post-money valuation at most recent funding round or mark-to-market"
    dataType: number
    unit: USD
    category: financial
    temporal: true
    appliesTo: [organization]
    display:
      divisor: 1e9
      prefix: "$"
      suffix: "B"

  headcount:
    name: Headcount
    description: "Total full-time employee count"
    dataType: number
    unit: employees
    category: financial
    temporal: true
    appliesTo: [organization]
    display:
      suffix: " employees"

  total-funding:
    name: Total Funding Raised
    description: "Cumulative capital raised across all funding rounds"
    dataType: number
    unit: USD
    category: financial
    temporal: true
    appliesTo: [organization]
    display:
      divisor: 1e9
      prefix: "$"
      suffix: "B"

  funding-round-amount:
    name: Funding Round Amount
    description: "Capital raised in a specific funding round"
    dataType: number
    unit: USD
    category: financial
    appliesTo: [organization]
    display:
      divisor: 1e6
      prefix: "$"
      suffix: "M"

  # ── People & Relationships ────────────────────────────────────

  employed-by:
    name: Employed By
    description: "Organization this person currently or historically works for"
    dataType: ref
    category: people
    temporal: true
    appliesTo: [person]
    inverseId: employer-of
    inverseName: Employs

  employer-of:
    name: Employs
    description: "People employed by this organization (computed from employed-by facts)"
    dataType: refs
    category: people
    appliesTo: [organization]
    inverseId: employed-by
    inverseName: Employed By
    computed: true

  role:
    name: Role / Title
    description: "Job title or role at primary employer"
    dataType: text
    category: people
    temporal: true
    appliesTo: [person]

  education:
    name: Education
    description: "University degree or highest educational attainment"
    dataType: text
    category: biographical
    appliesTo: [person]

  notable-for:
    name: Notable For
    description: "What this person is primarily known for (one-line summary)"
    dataType: text
    category: biographical
    appliesTo: [person]

  net-worth:
    name: Net Worth
    description: "Estimated net worth (for public figures with reliable estimates)"
    dataType: number
    unit: USD
    category: biographical
    temporal: true
    appliesTo: [person]
    display:
      divisor: 1e9
      prefix: "$"
      suffix: "B"

  social-media:
    name: Social Media
    description: "Primary social media handle (e.g., Twitter/X @handle)"
    dataType: text
    category: biographical
    appliesTo: [person]

  founded-by:
    name: Founded By
    description: "Person(s) who founded this organization"
    dataType: refs
    category: people
    appliesTo: [organization]
    inverseId: founder-of
    inverseName: Founded

  founder-of:
    name: Founder Of
    description: "Organization(s) this person founded (computed from founded-by facts)"
    dataType: refs
    category: people
    appliesTo: [person]
    inverseId: founded-by
    inverseName: Founded By
    computed: true

  gross-margin:
    name: Gross Margin
    description: "Gross margin percentage"
    dataType: number
    unit: percent
    category: financial
    temporal: true
    appliesTo: [organization]
    display:
      suffix: "%"

  market-share:
    name: Market Share
    description: "Estimated market share in the relevant segment"
    dataType: number
    unit: percent
    category: financial
    temporal: true
    appliesTo: [organization]
    display:
      suffix: "%"

  user-count:
    name: User Count
    description: "Total number of active users"
    dataType: number
    unit: users
    category: product
    temporal: true
    appliesTo: [organization]

  # ── Dates ─────────────────────────────────────────────────────

  founded-date:
    name: Founded Date
    description: "Date the organization was incorporated or officially founded"
    dataType: date
    category: organization
    appliesTo: [organization]

  born-year:
    name: Birth Year
    description: "Year the person was born"
    dataType: number
    category: biographical
    appliesTo: [person]
    display:
      suffix: ""

  launched-date:
    name: Launch Date
    description: "Date a product or project was publicly launched"
    dataType: date
    category: product
    appliesTo: [product, project]

  # ── Structure ─────────────────────────────────────────────────

  headquarters:
    name: Headquarters
    description: "Primary office location (city, state/country)"
    dataType: text
    category: organization
    appliesTo: [organization]

  legal-structure:
    name: Legal Structure
    description: "Corporate form (e.g. Public benefit corporation, LLC, 501(c)(3))"
    dataType: text
    category: organization
    appliesTo: [organization]

  # ── Product & Usage ─────────────────────────────────────────────

  monthly-active-users:
    name: Monthly Active Users
    description: "Monthly active users (MAU)"
    dataType: number
    category: product
    temporal: true
    appliesTo: [organization]
    display:
      divisor: 1e6
      suffix: "M"

  business-customers:
    name: Business Customers
    description: "Number of business/enterprise customers"
    dataType: number
    category: product
    temporal: true
    appliesTo: [organization]
    display:
      divisor: 1000
      suffix: "K"

  api-calls-monthly:
    name: Monthly API Calls
    description: "Monthly API request volume"
    dataType: number
    category: product
    temporal: true
    appliesTo: [organization]
    display:
      divisor: 1e9
      suffix: "B"

  product-revenue:
    name: Product Revenue
    description: "Annualized revenue from a specific product line"
    dataType: number
    unit: USD
    category: financial
    temporal: true
    appliesTo: [organization]
    display:
      divisor: 1e9
      prefix: "$"
      suffix: "B"

  # ── Financial Detail ─────────────────────────────────────────────

  cash-burn:
    name: Annual Cash Burn
    description: "Annual net cash burn (negative free cash flow)"
    dataType: number
    unit: USD
    category: financial
    temporal: true
    appliesTo: [organization]
    display:
      divisor: 1e9
      prefix: "$"
      suffix: "B"

  enterprise-market-share:
    name: Enterprise Market Share
    description: "Enterprise LLM market share by usage"
    dataType: number
    unit: percent
    category: financial
    temporal: true
    appliesTo: [organization]
    display:
      suffix: "%"

  coding-market-share:
    name: Coding Market Share
    description: "Enterprise coding assistant market share"
    dataType: number
    unit: percent
    category: financial
    temporal: true
    appliesTo: [organization]
    display:
      suffix: "%"

  # ── Safety ──────────────────────────────────────────────────────

  safety-level:
    name: AI Safety Level
    description: "Current AI Safety Level designation under RSP (e.g. ASL-2, ASL-3)"
    dataType: text
    category: safety
    temporal: true
    appliesTo: [organization]

  safety-researcher-count:
    name: Safety Researchers
    description: "Number of employees working on safety-related research"
    dataType: number
    category: safety
    temporal: true
    appliesTo: [organization]

  interpretability-team-size:
    name: Interpretability Team Size
    description: "Number of researchers focused on mechanistic interpretability"
    dataType: number
    category: safety
    temporal: true
    appliesTo: [organization]

  # ── AI Model Properties ───────────────────────────────────────────────

  parameter-count:
    name: Parameter Count
    description: "Total number of trainable parameters in the model (in billions)"
    dataType: number
    unit: parameters
    category: model
    appliesTo: [ai-model]
    display:
      divisor: 1e9
      suffix: "B params"

  context-window:
    name: Context Window
    description: "Maximum number of tokens the model can process in a single context"
    dataType: number
    unit: tokens
    category: model
    temporal: true
    appliesTo: [ai-model]
    display:
      divisor: 1000
      suffix: "K tokens"

  training-compute:
    name: Training Compute
    description: "Estimated compute used for training (in FLOPs)"
    dataType: number
    unit: FLOPs
    category: model
    appliesTo: [ai-model]

  model-release-date:
    name: Release Date
    description: "Date the model was publicly released or announced"
    dataType: date
    category: model
    appliesTo: [ai-model]

  developed-by:
    name: Developed By
    description: "Organization that developed or released this AI model"
    dataType: ref
    category: model
    appliesTo: [ai-model]
    inverseId: developed-models
    inverseName: Developed Models

  developed-models:
    name: Developed Models
    description: "AI models developed by this organization (computed from developed-by facts)"
    dataType: refs
    category: model
    appliesTo: [organization]
    inverseId: developed-by
    inverseName: Developed By
    computed: true

  model-family:
    name: Model Family
    description: "Model series or family this model belongs to (e.g., GPT-4, Claude 3)"
    dataType: text
    category: model
    appliesTo: [ai-model]

  modality:
    name: Modality
    description: "Input/output modalities supported (e.g., text, vision, audio, code)"
    dataType: text
    category: model
    appliesTo: [ai-model]

  license-type:
    name: License Type
    description: "License type: open-weights, open-source, proprietary, research-only"
    dataType: text
    category: model
    appliesTo: [ai-model]

  # ── Risk & Concept Properties ─────────────────────────────────────────

  p-doom:
    name: P(doom)
    description: "Expert estimate of probability of catastrophic/existential AI outcome (%)"
    dataType: number
    unit: percent
    category: risk
    temporal: true
    appliesTo: [risk, concept, debate]
    display:
      suffix: "%"

  expert-consensus-level:
    name: Expert Consensus Level
    description: "Degree of expert agreement: high / medium / low / contested / unknown"
    dataType: text
    category: epistemic
    appliesTo: [risk, approach, debate, concept, capability]

  evidence-strength:
    name: Evidence Strength
    description: "Quality of supporting evidence: strong / moderate / weak / mixed / theoretical"
    dataType: text
    category: epistemic
    appliesTo: [risk, approach, debate, concept, capability]

  severity-level:
    name: Severity Level
    description: "Potential impact severity: catastrophic / severe / moderate / minor"
    dataType: text
    category: risk
    appliesTo: [risk]

  likelihood-estimate:
    name: Likelihood Estimate
    description: "Estimated probability this risk materializes within the relevant timeframe (%)"
    dataType: number
    unit: percent
    category: risk
    temporal: true
    appliesTo: [risk]
    display:
      suffix: "%"

  reversibility:
    name: Reversibility
    description: "Whether the impact is reversible: reversible / partially-reversible / irreversible"
    dataType: text
    category: risk
    appliesTo: [risk]

  time-horizon:
    name: Time Horizon
    description: "Timeframe for risk materialization or approach relevance: near-term / medium-term / long-term / ongoing"
    dataType: text
    category: concept
    appliesTo: [risk, approach, debate, concept, capability]

  # ── Approach & Response Properties ────────────────────────────────────

  intervention-type:
    name: Intervention Type
    description: "Category of approach: technical / policy / governance / research / community"
    dataType: text
    category: approach
    appliesTo: [approach]

  maturity-level:
    name: Maturity Level
    description: "Development stage: theoretical / early-research / active-research / deployed / mature"
    dataType: text
    category: approach
    appliesTo: [approach, capability]

  key-proponents:
    name: Key Proponents
    description: "People or organizations most associated with advocating this approach"
    dataType: refs
    category: approach
    appliesTo: [approach, debate]

  addresses-risk:
    name: Addresses Risk
    description: "Risk(s) this approach is designed to mitigate (refs to risk entities)"
    dataType: refs
    category: approach
    appliesTo: [approach]

  tractability:
    name: Tractability
    description: "How tractable the approach is: high / medium / low / unknown"
    dataType: text
    category: approach
    appliesTo: [approach]

  # ── Debate Properties ─────────────────────────────────────────────────

  core-question:
    name: Core Question
    description: "The central question or crux of the debate"
    dataType: text
    category: debate
    appliesTo: [debate]

  mainstream-position:
    name: Mainstream Position
    description: "The dominant or most widely-held view among experts"
    dataType: text
    category: debate
    appliesTo: [debate]

  minority-position:
    name: Minority Position
    description: "A significant dissenting or minority view"
    dataType: text
    category: debate
    appliesTo: [debate]

  # ── Research & Epistemic Properties ──────────────────────────────────

  publication-date:
    name: Publication Date
    description: "Date a research paper, report, or document was published"
    dataType: date
    category: research
    appliesTo: [concept, approach, risk, debate]

  research-consensus:
    name: Research Consensus
    description: "What the research literature broadly agrees on regarding this topic"
    dataType: text
    category: epistemic
    appliesTo: [risk, approach, debate, concept, capability]

  survey-result:
    name: Survey Result
    description: "Numerical result from a relevant survey or poll (e.g., expert survey response)"
    dataType: number
    unit: percent
    category: epistemic
    temporal: true
    appliesTo: [risk, approach, debate, concept]
    display:
      suffix: "%"

  open-questions:
    name: Open Questions
    description: "Key unresolved questions in this area"
    dataType: text
    category: epistemic
    appliesTo: [risk, approach, debate, concept, capability]
