    value: Reinforcement Learning from Human Feedback (RLHF) is a training technique that fine-tunes AI models using human
      preference ratings to align outputs with human values and intentions. Pioneered at OpenAI and Anthropic, RLHF
      became a core component of instruction-following models and is central to debates about scalability of alignment
      techniques.
