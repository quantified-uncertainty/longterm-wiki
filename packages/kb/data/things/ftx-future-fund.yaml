facts:
  - id: f_e6sqIlWDIQ
    property: description
    value: The FTX Future Fund was a philanthropic vehicle launched in February 2022 by the FTX Foundation, primarily funded
      by Sam Bankman-Fried. It distributed $132 million in 262 grants within its first four months, with approximately
      $32 million directed to AI safety research. The fund collapsed abruptly in November 2022 when FTX filed for
      bankruptcy; its entire team resigned publicly, stating that they believed committed grants could not be honored
      and raising questions about the legitimacy of the funds' source.
    asOf: 2026-03
    notes: Migrated from old entity system
  - id: f_KTWCJv2vQw
    property: website
    value: https://forum.effectivealtruism.org/posts/2mx6xrDrwiEKzfgks/announcing-the-future-fund-1

