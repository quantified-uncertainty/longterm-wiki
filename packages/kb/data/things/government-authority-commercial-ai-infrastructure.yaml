  name: US Government Authority Over Commercial AI Infrastructure
  numericId: E688
facts:
  - id: f_O6vGSNCGtw
    property: description
    value: The US government possesses extensive legal authority to direct, commandeer, or access the $700B+ in commercial
      AI infrastructure owned by US companies, through the Defense Production Act (priority contracts), CLOUD Act
      (global data access), FISA 702 (warrantless surveillance of non-US persons), IEEPA (emergency commerce
      regulation), and executive orders. Historical precedents include WWII industrial mobilization, post-9/11 PRISM
      surveillance, and COVID-era DPA invocations. Current military-commercial integration (Pentagon contracts with
      Anthropic, Google, OpenAI, xAI; GenAI.mil serving 3M personnel) creates pre-existing channels for rapid
      mobilization.
    asOf: 2026-03
    notes: Migrated from old entity system
