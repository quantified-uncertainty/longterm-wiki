    value: The UK AI Safety Institute (UK AISI) is a government organization established in 2023 to advance AI safety
      through research, evaluation, and international coordination. Created in the wake of the first AI Safety Summit
      hosted by the UK government, AISI represents the UK's commitment to being a global leader in AI safety and
      governance.
