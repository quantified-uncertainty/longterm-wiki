    value: In February 2026, the Trump administration ordered all federal agencies to cease using Anthropic's technology and
      designated the company a "supply chain risk to national security" — a category normally reserved for foreign
      adversaries — after Anthropic refused to remove restrictions on autonomous weapons and mass domestic surveillance
      from its Pentagon contract. The standoff, triggered by the use of Claude AI in the January 2026 Venezuela raid,
      represents the first major confrontation between a frontier AI lab and the US government over ethical red lines in
      military AI deployment.
