    value: The standard transformer architecture powering current frontier AI, where all parameters are active for every
      token. Since Vaswani et al.'s 2017 paper (160,000+ citations), dense transformers power GPT-4, Claude 3, Llama 3,
      and Gemini. Despite open weights for some models, mechanistic interpretability remains primitive with a
      fundamental gap between feature extraction and behavior prediction.
