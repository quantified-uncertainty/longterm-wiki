  name: AI-Human Hybrid Systems
  numericId: E161
facts:
  - id: f_Rl37Ieg2rg
    property: description
    value: >-
      AI-human hybrid systems are designs that deliberately combine AI capabilities with human judgment to achieve
      outcomes better than either could produce alone. Rather than full automation or human-only processes, hybrid
      systems aim to capture the benefits of AI (scale, speed, consistency, pattern recognition) while preserving the
      benefits of human judgment (contextual understanding, values, robustness to novel situations).


      Effective hybrid systems require careful design to avoid the pathologies of both pure automation and nominal human
      oversight. Automation bias leads humans to defer to AI even when AI is wrong. Rubber-stamp oversight gives an
      illusion of human control without substance. The challenge is creating systems where humans genuinely contribute
      and AI genuinely assists, rather than one side dominating or the partnership failing.


      Examples of promising hybrid approaches include: AI systems that flag decisions for human review based on
      uncertainty or stakes, rather than automating all decisions; human-in-the-loop systems where AI drafts and humans
      edit; collaborative intelligence systems where AI and humans have complementary roles; and AI tutoring systems
      that guide rather than replace learning. For AI safety, hybrid systems represent a middle ground between naive
      confidence in human oversight and resignation to full AI autonomy.
