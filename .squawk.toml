pg_version = "16"

# Rules excluded with justification:
#
# prefer-bigint-over-int: Drizzle ORM generates `integer` for serial PKs in Drizzle schema;
#   changing to bigint requires a schema change, not just migration edits. Low risk for
#   this app's data volumes.
#
# prefer-identity: Drizzle generates `bigserial` / `serial` for auto-increment columns.
#   Switching to IDENTITY requires Drizzle schema changes. Advisory-only for now.
#
# prefer-text-field: Drizzle uses `varchar` for bounded-length fields. Convention is
#   project-wide and consistent.
#
# require-timeout-settings: Migrations run in a controlled deployment context (not live
#   prod traffic tool calls). Requiring lock_timeout/statement_timeout on every migration
#   adds boilerplate without clear benefit for this project's deployment model.
#
# prefer-robust-stmts: Drizzle generates migrations without IF NOT EXISTS / IF EXISTS on
#   some DDL (e.g. CREATE TABLE). False positives on generated files. The Drizzle journal
#   integrity check (validate-drizzle-journal.ts) provides the equivalent safety guarantee
#   by ensuring migrations only run once.
#
# require-concurrent-index-creation, require-concurrent-index-deletion,
# disallowed-unique-constraint, constraint-missing-not-valid,
# adding-not-nullable-field, adding-foreign-key-constraint:
#   Drizzle's migrator runs ALL statements in a single transaction (see pg-core/dialect.js
#   line 60). CREATE/DROP INDEX CONCURRENTLY cannot run inside a transaction, and the NOT VALID
#   two-step pattern for FK constraints requires two separate transactions — both impossible
#   with Drizzle. Tables are small (hundreds of rows) so brief locking is acceptable.
#   If large-table migrations are needed in the future, use a separate raw SQL runner
#   outside Drizzle (see .claude/rules/database-migrations.md for the manual migration pattern).
#
# ban-drop-column:
#   Intentional column removals are part of the deliberate consolidation/cleanup migrations
#   in this project (e.g. removing FK columns superseded by a new data model). The column
#   removal risk is mitigated by updating all consumers in the same PR before deploying.
#
# changing-column-type:
#   All type changes in this project are safe casts (VARCHAR(n) → TEXT, widening numeric
#   types) that PostgreSQL handles without table rewrites. Tables are small enough that even
#   if a rewrite occurred, it would complete in seconds. Risk is mitigated by testing the
#   migration against a production-like schema in CI (Test DB migrations job).
excluded_rules = [
  "prefer-bigint-over-int",
  "prefer-identity",
  "prefer-text-field",
  "require-timeout-settings",
  "prefer-robust-stmts",
  "require-concurrent-index-creation",
  "require-concurrent-index-deletion",
  "disallowed-unique-constraint",
  "constraint-missing-not-valid",
  "adding-not-nullable-field",
  "adding-foreign-key-constraint",
  "renaming-table",
  "ban-drop-column",
  "changing-column-type",
]
