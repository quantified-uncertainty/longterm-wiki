# Measure & Property Definitions
#
# This is the unified taxonomy for structured data across the wiki.
# Used by both the facts system (<F> components) and structured claims.
#
# Numeric measures are (Subject, Measure, Time, Value) tuples:
#   (Anthropic, valuation, 2026-02, $380B)
#   (OpenAI,    valuation, 2025,    $500B)
#
# Non-numeric properties (string, entity, date) are also included for
# structured claim extraction and entity attribute tracking.
#
# Naming: We use "measure" (not "metric") to avoid collision with the existing
# wiki entity type "metric" which represents measurement domain pages.
#
# Property mapping: Structured claims use snake_case property IDs that map
# to measures here. See `propertyAliases` at the end of this file.

measures:
  # === Financial ===
  valuation:
    label: "Valuation"
    unit: USD
    category: financial
    direction: higher
    description: "Post-money valuation from funding rounds or private market transactions"
    display:
      divisor: 1000000000
      prefix: "$"
      suffix: "B"
    relatedMeasures: [revenue, total-funding, funding-round]
    applicableTo: [organization]

  revenue:
    label: "Revenue"
    unit: USD
    category: financial
    direction: higher
    description: "Annualized run-rate revenue (ARR) or reported annual revenue"
    display:
      divisor: 1000000000
      prefix: "$"
      suffix: "B"
    relatedMeasures: [valuation, gross-margin, product-revenue]
    applicableTo: [organization]

  revenue-guidance:
    label: "Revenue Guidance"
    unit: USD
    category: financial
    direction: higher
    description: "Forward-looking revenue projections or guidance ranges"
    display:
      divisor: 1000000000
      prefix: "$"
      suffix: "B"
    relatedMeasures: [revenue]
    applicableTo: [organization]

  funding-round:
    label: "Funding Round"
    unit: USD
    category: financial
    direction: higher
    description: "Amount raised in a single funding round"
    display:
      divisor: 1000000000
      prefix: "$"
      suffix: "B"
    relatedMeasures: [total-funding, valuation]
    applicableTo: [organization]

  total-funding:
    label: "Total Funding"
    unit: USD
    category: financial
    direction: higher
    description: "Cumulative funding raised across all rounds"
    display:
      divisor: 1000000000
      prefix: "$"
      suffix: "B"
    relatedMeasures: [funding-round, valuation]
    applicableTo: [organization]

  cash-burn:
    label: "Cash Burn"
    unit: USD
    category: financial
    direction: lower
    description: "Net cash burn rate (annualized)"
    display:
      divisor: 1000000000
      prefix: "$"
      suffix: "B"
    relatedMeasures: [revenue, gross-margin]
    applicableTo: [organization]

  gross-margin:
    label: "Gross Margin"
    unit: percent
    category: financial
    direction: higher
    description: "Gross margin percentage"
    relatedMeasures: [revenue, cash-burn]
    applicableTo: [organization]

  product-revenue:
    label: "Product Revenue"
    unit: USD
    category: financial
    direction: higher
    description: "Revenue from a specific product line"
    display:
      divisor: 1000000000
      prefix: "$"
      suffix: "B"
    relatedMeasures: [revenue]
    applicableTo: [organization]

  infrastructure-investment:
    label: "Infrastructure Investment"
    unit: USD
    category: financial
    description: "Planned or committed infrastructure spending"
    display:
      divisor: 1000000000
      prefix: "$"
      suffix: "B"
    applicableTo: [organization]

  # === Organizational ===
  headcount:
    label: "Headcount"
    unit: count
    category: organizational
    direction: higher
    description: "Total number of employees"
    relatedMeasures: [safety-researcher-count, interpretability-team-size]
    applicableTo: [organization]

  customer-count:
    label: "Customer Count"
    unit: count
    category: organizational
    direction: higher
    description: "Number of business customers"
    relatedMeasures: [revenue, customer-concentration, retention-rate]
    applicableTo: [organization]

  customer-concentration:
    label: "Customer Concentration"
    unit: percent
    category: organizational
    direction: lower
    description: "Revenue share from top customers (lower = more diversified)"
    relatedMeasures: [customer-count, revenue]
    applicableTo: [organization]

  retention-rate:
    label: "Retention Rate"
    unit: percent
    category: organizational
    direction: higher
    description: "Customer or net revenue retention rate"
    relatedMeasures: [customer-count, revenue]
    applicableTo: [organization]

  user-count:
    label: "User Count"
    unit: count
    category: organizational
    direction: higher
    description: "Number of users of a product or platform"
    applicableTo: [organization]

  # === Safety ===
  safety-researcher-count:
    label: "Safety Researchers"
    unit: count
    category: safety
    direction: higher
    description: "Number of safety/alignment researchers"
    relatedMeasures: [safety-staffing-ratio, interpretability-team-size, headcount]
    applicableTo: [organization]

  interpretability-team-size:
    label: "Interpretability Team Size"
    unit: count
    category: safety
    direction: higher
    description: "Number of researchers on interpretability/mechanistic interpretability team"
    relatedMeasures: [safety-researcher-count, headcount]
    applicableTo: [organization]

  safety-staffing-ratio:
    label: "Safety Staffing Ratio"
    unit: percent
    category: safety
    direction: higher
    description: "Safety researchers as percentage of technical staff"
    relatedMeasures: [safety-researcher-count, headcount]
    applicableTo: [organization]

  # === Model Performance ===
  benchmark-score:
    label: "Benchmark Score"
    unit: percent
    category: performance
    direction: higher
    description: "Score on a standardized benchmark"
    applicableTo: [organization]

  model-parameters:
    label: "Model Parameters"
    unit: count
    category: performance
    description: "Number of parameters in a model"
    applicableTo: [organization]

  # === Market ===
  market-share:
    label: "Market Share"
    unit: percent
    category: organizational
    direction: higher
    description: "Percentage share of a market, platform, or ecosystem"
    applicableTo: [organization]

  compute-cost:
    label: "Compute Cost"
    unit: percent
    category: performance
    direction: lower
    description: "Cost efficiency metric for compute infrastructure (e.g., cost reduction vs baseline)"
    applicableTo: [organization]

  # === People ===
  net-worth:
    label: "Net Worth"
    unit: USD
    category: financial
    direction: higher
    description: "Estimated personal net worth"
    display:
      divisor: 1000000000
      prefix: "$"
      suffix: "B"
    applicableTo: [person]

  equity-stake-percent:
    label: "Equity Stake"
    unit: percent
    category: financial
    direction: higher
    description: "Percentage equity stake in a company"
    relatedMeasures: [valuation, net-worth]
    applicableTo: [organization, person]

  equity-value:
    label: "Equity Value"
    unit: USD
    category: financial
    direction: higher
    description: "Market value of an equity pool, stake, or ownership group at current valuation"
    display:
      divisor: 1000000000
      prefix: "$"
      suffix: "B"
    relatedMeasures: [valuation, equity-stake-percent]
    applicableTo: [organization, person]

  philanthropic-capital:
    label: "Philanthropic Capital"
    unit: USD
    category: financial
    direction: higher
    description: "Estimated potential philanthropic giving — pledged or risk-adjusted charitable capital"
    display:
      divisor: 1000000000
      prefix: "$"
      suffix: "B"
    relatedMeasures: [net-worth, equity-value]
    applicableTo: [organization, person]

  # === Technical / AI-specific ===
  context-window:
    label: "Context Window"
    unit: tokens
    category: performance
    direction: higher
    description: "Maximum context window size in tokens"
    applicableTo: [organization]

  # === Dates / Milestones ===
  founded-date:
    label: "Founded Date"
    unit: date
    category: milestone
    description: "Date the entity was founded"
    applicableTo: [organization]

  launched-date:
    label: "Launched Date"
    unit: date
    category: milestone
    description: "Date a product or initiative was launched"
    applicableTo: [organization]

  shutdown-date:
    label: "Shutdown Date"
    unit: date
    category: milestone
    description: "Date an entity or product was shut down"
    applicableTo: [organization]

  # === Organizational (non-numeric) ===
  headquarters:
    label: "Headquarters"
    unit: string
    category: organizational
    description: "Location of headquarters"
    applicableTo: [organization]

  legal-structure:
    label: "Legal Structure"
    unit: string
    category: organizational
    description: "Corporate structure (PBC, C-corp, nonprofit, etc.)"
    applicableTo: [organization]

  # === Entity Relations ===
  founder:
    label: "Founder"
    unit: entity
    category: relation
    description: "Person who founded the entity"
    applicableTo: [organization]

  ceo:
    label: "CEO"
    unit: entity
    category: relation
    description: "Current chief executive officer"
    applicableTo: [organization]

  parent-org:
    label: "Parent Organization"
    unit: entity
    category: relation
    description: "Parent or owning organization"
    applicableTo: [organization]

  acquired-by:
    label: "Acquired By"
    unit: entity
    category: relation
    description: "Entity that acquired this one"
    applicableTo: [organization]

  # === Research / Impact ===
  citation-count:
    label: "Citation Count"
    unit: count
    category: research
    direction: higher
    description: "Number of academic or scholarly citations"
    applicableTo: [organization, person]

  github-stars:
    label: "GitHub Stars"
    unit: count
    category: research
    direction: higher
    description: "Number of GitHub stars on a repository or project"
    applicableTo: [organization]

  # === Risk / Safety Estimates ===
  doom-probability:
    label: "Doom Probability"
    unit: percent
    category: safety
    direction: lower
    description: "Estimated probability of existential catastrophe from AI"
    applicableTo: [organization, person]

  risk-probability:
    label: "Risk Probability"
    unit: percent
    category: safety
    direction: lower
    description: "Estimated probability of a specific risk scenario materializing"
    applicableTo: [organization, person]

  risk-assessment:
    label: "Risk Assessment"
    unit: string
    category: safety
    description: "Qualitative assessment of risk level (e.g., low, medium, high)"
    applicableTo: [organization, person]

  alignment-faking-rate:
    label: "Alignment Faking Rate"
    unit: percent
    category: safety
    direction: lower
    description: "Observed or estimated rate of alignment faking behavior in AI systems"
    applicableTo: [organization]

  # === Generic Fallback ===
  generic-count:
    label: "Count"
    unit: count
    category: organizational
    description: "Generic count measure (fallback for unclassified numeric counts)"
    applicableTo: [organization, person]

  generic-percent:
    label: "Percentage"
    unit: percent
    category: organizational
    description: "Generic percentage measure (fallback for unclassified percentages)"
    applicableTo: [organization, person]

  # === Market ===
  market-volume:
    label: "Market/Transaction Volume"
    unit: USD
    category: financial
    direction: higher
    description: "Trading or transaction volume over a period"
    display:
      divisor: 1000000000
      prefix: "$"
      suffix: "B"
    applicableTo: [organization]

# Mapping from structured claims property IDs (snake_case) to measure IDs (kebab-case).
# Used by the enrichment pipeline and display layer to unify both naming conventions.
propertyAliases:
  funding_round_amount: funding-round
  funding_total: total-funding
  valuation: valuation
  revenue: revenue
  market_volume: market-volume
  employee_count: headcount
  market_share: market-share
  headquarters: headquarters
  legal_structure: legal-structure
  founded_date: founded-date
  launched_date: launched-date
  announced_date: launched-date  # maps to closest equivalent
  shutdown_date: shutdown-date
  founder: founder
  ceo: ceo
  parent_org: parent-org
  acquired_by: acquired-by
  parameter_count: model-parameters
  benchmark_score: benchmark-score
  context_window: context-window
  doom_probability: doom-probability
  risk_probability: risk-probability
  risk_assessment: risk-assessment
  alignment_faking_rate: alignment-faking-rate
  citations: citation-count
  citation_count: citation-count
  github_stars: github-stars
  count: generic-count
  percent: generic-percent
