# Controlled vocabulary for structured claim properties.
#
# Each property defines a named attribute that can be extracted from claims.
# The extraction prompt uses this list to normalize claim properties.
# Grow organically — add properties as extraction encounters common patterns.
#
# See: https://github.com/quantified-uncertainty/longterm-wiki/issues/1164

properties:
  # ── Financial ──────────────────────────────────────────────────────────
  - id: funding_round_amount
    label: "Funding Round Amount"
    description: "Amount raised in a single funding round"
    value_type: number
    value_unit: USD
    category: financial

  - id: funding_total
    label: "Total Funding Raised"
    description: "Cumulative funding raised across all rounds"
    value_type: number
    value_unit: USD
    category: financial

  - id: valuation
    label: "Company Valuation"
    description: "Pre-money or post-money valuation"
    value_type: number
    value_unit: USD
    category: financial

  - id: revenue
    label: "Revenue"
    description: "Annual or quarterly revenue"
    value_type: number
    value_unit: USD
    category: financial

  - id: market_volume
    label: "Market/Transaction Volume"
    description: "Trading or transaction volume over a period"
    value_type: number
    value_unit: USD
    category: financial

  # ── Organizational ─────────────────────────────────────────────────────
  - id: employee_count
    label: "Employee Count"
    description: "Number of employees or headcount"
    value_type: number
    value_unit: count
    category: organizational

  - id: market_share
    label: "Market Share"
    description: "Percentage of market captured"
    value_type: number
    value_unit: percent
    category: organizational

  - id: headquarters
    label: "Headquarters"
    description: "Location of headquarters"
    value_type: string
    category: organizational

  - id: legal_structure
    label: "Legal Structure"
    description: "Corporate structure (PBC, C-corp, nonprofit, etc.)"
    value_type: string
    category: organizational

  # ── Dates / Milestones ─────────────────────────────────────────────────
  - id: founded_date
    label: "Founded Date"
    description: "Date the entity was founded"
    value_type: date
    category: milestone

  - id: launched_date
    label: "Launched Date"
    description: "Date a product or initiative was launched"
    value_type: date
    category: milestone

  - id: announced_date
    label: "Announced Date"
    description: "Date an announcement was made"
    value_type: date
    category: milestone

  - id: shutdown_date
    label: "Shutdown Date"
    description: "Date an entity or product was shut down"
    value_type: date
    category: milestone

  # ── Entity Relations ───────────────────────────────────────────────────
  - id: founder
    label: "Founder"
    description: "Person who founded the entity"
    value_type: entity
    category: relation

  - id: ceo
    label: "CEO"
    description: "Current chief executive officer"
    value_type: entity
    category: relation

  - id: parent_org
    label: "Parent Organization"
    description: "Parent or owning organization"
    value_type: entity
    category: relation

  - id: acquired_by
    label: "Acquired By"
    description: "Entity that acquired this one"
    value_type: entity
    category: relation

  # ── Technical / AI-specific ────────────────────────────────────────────
  - id: parameter_count
    label: "Parameter Count"
    description: "Number of model parameters"
    value_type: number
    value_unit: count
    category: technical

  - id: benchmark_score
    label: "Benchmark Score"
    description: "Score on a named benchmark"
    value_type: number
    category: technical

  - id: context_window
    label: "Context Window"
    description: "Maximum context window size in tokens"
    value_type: number
    value_unit: tokens
    category: technical

  # ── Research / Impact ──────────────────────────────────────────────────
  - id: citation_count
    label: "Citation Count"
    description: "Number of academic or scholarly citations"
    value_type: number
    value_unit: count
    category: research

  - id: citations
    label: "Citations"
    description: "Number of academic or scholarly citations (alias for citation_count)"
    value_type: number
    value_unit: count
    category: research

  - id: github_stars
    label: "GitHub Stars"
    description: "Number of GitHub stars on a repository or project"
    value_type: number
    value_unit: count
    category: research

  # ── Risk / Safety Estimates ────────────────────────────────────────────
  - id: doom_probability
    label: "Doom Probability"
    description: "Estimated probability of existential catastrophe from AI"
    value_type: number
    value_unit: percent
    category: safety

  - id: risk_probability
    label: "Risk Probability"
    description: "Estimated probability of a specific risk scenario materializing"
    value_type: number
    value_unit: percent
    category: safety

  - id: risk_assessment
    label: "Risk Assessment"
    description: "Qualitative assessment of risk level"
    value_type: string
    category: safety

  - id: alignment_faking_rate
    label: "Alignment Faking Rate"
    description: "Observed or estimated rate of alignment faking behavior in AI systems"
    value_type: number
    value_unit: percent
    category: safety

  # ── Person-specific ──────────────────────────────────────────────────
  - id: position
    label: "Position / Role"
    description: "Job title or role held by a person at an organization"
    value_type: string
    category: organizational

  - id: employer
    label: "Employer"
    description: "Organization where a person is employed"
    value_type: entity
    category: relation

  - id: publication_count
    label: "Publications Count"
    description: "Number of academic or technical publications authored"
    value_type: number
    value_unit: count
    category: research

  - id: h_index
    label: "h-index"
    description: "h-index measuring research impact"
    value_type: number
    category: research

  # ── Additional Safety ───────────────────────────────────────────────
  - id: safety_team_size
    label: "Safety Team Size"
    description: "Number of people on the safety/alignment team"
    value_type: number
    value_unit: count
    category: safety
    staleness_cadence: annually

  - id: policy_commitment
    label: "Policy Commitment"
    description: "Public policy commitment or voluntary agreement related to AI safety"
    value_type: string
    category: safety

  # ── Additional Organizational ───────────────────────────────────────
  - id: board_composition
    label: "Board Composition"
    description: "Description of board structure and key members"
    value_type: string
    category: organizational

  # ── Additional Financial ────────────────────────────────────────────
  - id: compute_budget
    label: "Compute Budget"
    description: "Estimated or reported compute expenditure"
    value_type: number
    value_unit: USD
    category: financial

  # ── Additional Technical ────────────────────────────────────────────
  - id: product_name
    label: "Product Name"
    description: "Name of a product or service offered by the entity"
    value_type: string
    category: technical

  # ── Additional Milestones ───────────────────────────────────────────
  - id: release_date
    label: "Release Date"
    description: "Date a product, model, or version was released"
    value_type: date
    category: milestone

  # ── Generic Fallback ───────────────────────────────────────────────────
  - id: count
    label: "Count"
    description: "Generic count measure (fallback for unclassified numeric counts)"
    value_type: number
    value_unit: count
    category: organizational

  - id: percent
    label: "Percentage"
    description: "Generic percentage measure (fallback for unclassified percentages)"
    value_type: number
    value_unit: percent
    category: organizational
