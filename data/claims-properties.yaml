# Controlled vocabulary for structured claim properties.
#
# Each property defines a named attribute that can be extracted from claims.
# The extraction prompt uses this list to normalize claim properties.
# Grow organically — add properties as extraction encounters common patterns.
#
# See: https://github.com/quantified-uncertainty/longterm-wiki/issues/1164

properties:
  # ── Financial ──────────────────────────────────────────────────────────
  - id: funding_round_amount
    label: "Funding Round Amount"
    description: "Amount raised in a single funding round"
    value_type: number
    value_unit: USD
    category: financial

  - id: funding_total
    label: "Total Funding Raised"
    description: "Cumulative funding raised across all rounds"
    value_type: number
    value_unit: USD
    category: financial

  - id: valuation
    label: "Company Valuation"
    description: "Pre-money or post-money valuation"
    value_type: number
    value_unit: USD
    category: financial

  - id: revenue
    label: "Revenue"
    description: "Annual or quarterly revenue"
    value_type: number
    value_unit: USD
    category: financial

  - id: market_volume
    label: "Market/Transaction Volume"
    description: "Trading or transaction volume over a period"
    value_type: number
    value_unit: USD
    category: financial

  # ── Organizational ─────────────────────────────────────────────────────
  - id: employee_count
    label: "Employee Count"
    description: "Number of employees or headcount"
    value_type: number
    value_unit: count
    category: organizational

  - id: market_share
    label: "Market Share"
    description: "Percentage of market captured"
    value_type: number
    value_unit: percent
    category: organizational

  - id: headquarters
    label: "Headquarters"
    description: "Location of headquarters"
    value_type: string
    category: organizational

  - id: legal_structure
    label: "Legal Structure"
    description: "Corporate structure (PBC, C-corp, nonprofit, etc.)"
    value_type: string
    category: organizational

  # ── Dates / Milestones ─────────────────────────────────────────────────
  - id: founded_date
    label: "Founded Date"
    description: "Date the entity was founded"
    value_type: date
    category: milestone

  - id: launched_date
    label: "Launched Date"
    description: "Date a product or initiative was launched"
    value_type: date
    category: milestone

  - id: announced_date
    label: "Announced Date"
    description: "Date an announcement was made"
    value_type: date
    category: milestone

  - id: shutdown_date
    label: "Shutdown Date"
    description: "Date an entity or product was shut down"
    value_type: date
    category: milestone

  # ── Entity Relations ───────────────────────────────────────────────────
  - id: founder
    label: "Founder"
    description: "Person who founded the entity"
    value_type: entity
    category: relation

  - id: ceo
    label: "CEO"
    description: "Current chief executive officer"
    value_type: entity
    category: relation

  - id: parent_org
    label: "Parent Organization"
    description: "Parent or owning organization"
    value_type: entity
    category: relation

  - id: acquired_by
    label: "Acquired By"
    description: "Entity that acquired this one"
    value_type: entity
    category: relation

  # ── Technical / AI-specific ────────────────────────────────────────────
  - id: parameter_count
    label: "Parameter Count"
    description: "Number of model parameters"
    value_type: number
    value_unit: count
    category: technical

  - id: benchmark_score
    label: "Benchmark Score"
    description: "Score on a named benchmark"
    value_type: number
    category: technical

  - id: context_window
    label: "Context Window"
    description: "Maximum context window size in tokens"
    value_type: number
    value_unit: tokens
    category: technical

  # ── Research / Impact ──────────────────────────────────────────────────
  - id: citation_count
    label: "Citation Count"
    description: "Number of academic or scholarly citations"
    value_type: number
    value_unit: count
    category: research

  - id: citations
    label: "Citations"
    description: "Number of academic or scholarly citations (alias for citation_count)"
    value_type: number
    value_unit: count
    category: research

  - id: github_stars
    label: "GitHub Stars"
    description: "Number of GitHub stars on a repository or project"
    value_type: number
    value_unit: count
    category: research

  # ── Risk / Safety Estimates ────────────────────────────────────────────
  - id: doom_probability
    label: "Doom Probability"
    description: "Estimated probability of existential catastrophe from AI"
    value_type: number
    value_unit: percent
    category: safety

  - id: risk_probability
    label: "Risk Probability"
    description: "Estimated probability of a specific risk scenario materializing"
    value_type: number
    value_unit: percent
    category: safety

  - id: risk_assessment
    label: "Risk Assessment"
    description: "Qualitative assessment of risk level"
    value_type: string
    category: safety

  - id: alignment_faking_rate
    label: "Alignment Faking Rate"
    description: "Observed or estimated rate of alignment faking behavior in AI systems"
    value_type: number
    value_unit: percent
    category: safety

  # ── Person-specific ──────────────────────────────────────────────────
  - id: position
    label: "Position / Role"
    description: "Job title or role held by a person at an organization"
    value_type: string
    category: organizational

  - id: employer
    label: "Employer"
    description: "Organization where a person is employed"
    value_type: entity
    category: relation

  - id: publication_count
    label: "Publications Count"
    description: "Number of academic or technical publications authored"
    value_type: number
    value_unit: count
    category: research

  - id: h_index
    label: "h-index"
    description: "h-index measuring research impact"
    value_type: number
    category: research

  # ── Additional Safety ───────────────────────────────────────────────
  - id: safety_team_size
    label: "Safety Team Size"
    description: "Number of people on the safety/alignment team"
    value_type: number
    value_unit: count
    category: safety
    staleness_cadence: annually

  - id: policy_commitment
    label: "Policy Commitment"
    description: "Public policy commitment or voluntary agreement related to AI safety"
    value_type: string
    category: safety

  # ── Additional Organizational ───────────────────────────────────────
  - id: board_composition
    label: "Board Composition"
    description: "Description of board structure and key members"
    value_type: string
    category: organizational

  # ── Additional Financial ────────────────────────────────────────────
  - id: compute_budget
    label: "Compute Budget"
    description: "Estimated or reported compute expenditure"
    value_type: number
    value_unit: USD
    category: financial

  # ── Additional Technical ────────────────────────────────────────────
  - id: product_name
    label: "Product Name"
    description: "Name of a product or service offered by the entity"
    value_type: string
    category: technical

  # ── Additional Milestones ───────────────────────────────────────────
  - id: release_date
    label: "Release Date"
    description: "Date a product, model, or version was released"
    value_type: date
    category: milestone

  # ── People & Leadership ────────────────────────────────────────────────
  - id: team_size
    label: "Team Size"
    description: "Size of a specific team or division within an organization"
    value_type: number
    value_unit: count
    category: people
    entity_types: [organization]

  - id: chief_scientist
    label: "Chief Scientist"
    description: "Chief scientist or head of research at an organization"
    value_type: entity
    category: relation
    entity_types: [organization]

  - id: education
    label: "Education"
    description: "Educational background, degrees, or institutional affiliations"
    value_type: string
    category: people
    entity_types: [person]

  - id: research_group_lead
    label: "Research Group Lead"
    description: "Leader of a specific research group or team"
    value_type: entity
    category: relation
    entity_types: [organization]

  # ── Products ─────────────────────────────────────────────────────────
  - id: product_release
    label: "Product Release"
    description: "Product or model release event"
    value_type: string
    category: products
    entity_types: [organization]

  - id: model_capability
    label: "Model Capability"
    description: "Qualitative capability description of a model or product"
    value_type: string
    category: products
    entity_types: [organization]

  - id: safety_level
    label: "Safety Level"
    description: "AI Safety Level (ASL) or safety classification tier"
    value_type: string
    category: products
    entity_types: [organization]

  - id: pricing
    label: "Pricing"
    description: "Pricing model, tier structure, or specific price point"
    value_type: string
    category: products
    entity_types: [organization]

  - id: user_count
    label: "User Count"
    description: "Number of users of a product or platform"
    value_type: number
    value_unit: count
    category: products
    entity_types: [organization]

  - id: api_volume
    label: "API Volume"
    description: "Number of API calls, requests, or tokens processed"
    value_type: number
    value_unit: count
    category: products
    entity_types: [organization]

  # ── Safety & Research (expanded) ──────────────────────────────────────
  - id: research_finding
    label: "Research Finding"
    description: "Empirical research result or discovery"
    value_type: string
    category: research
    entity_types: [organization, person]

  - id: research_methodology
    label: "Research Methodology"
    description: "Research method, approach, or experimental technique"
    value_type: string
    category: research
    entity_types: [organization]

  - id: publication
    label: "Publication"
    description: "Published paper, report, or technical document"
    value_type: string
    category: research
    entity_types: [organization, person]

  - id: interpretability_finding
    label: "Interpretability Finding"
    description: "Specific finding from interpretability or mechanistic interpretability research"
    value_type: string
    category: safety
    entity_types: [organization]

  - id: safety_incident
    label: "Safety Incident"
    description: "AI safety incident, failure, or concerning behavior observed in deployment"
    value_type: string
    category: safety
    entity_types: [organization]

  - id: red_team_result
    label: "Red Team Result"
    description: "Finding from red-teaming or adversarial testing of AI systems"
    value_type: string
    category: safety
    entity_types: [organization]

  - id: alignment_technique
    label: "Alignment Technique"
    description: "AI alignment method, approach, or training technique"
    value_type: string
    category: safety
    entity_types: [organization]

  - id: safety_evaluation
    label: "Safety Evaluation"
    description: "Formal safety evaluation result or assessment"
    value_type: string
    category: safety
    entity_types: [organization]

  - id: responsible_scaling_level
    label: "Responsible Scaling Level"
    description: "ASL or RSP tier classification for AI system capabilities"
    value_type: string
    category: safety
    entity_types: [organization]

  - id: biosecurity_finding
    label: "Biosecurity Finding"
    description: "Finding related to biosecurity risks from AI systems"
    value_type: string
    category: safety
    entity_types: [organization]

  # ── Governance & Policy (expanded) ────────────────────────────────────
  - id: governance_structure
    label: "Governance Structure"
    description: "Governance mechanism or board structure"
    value_type: string
    category: governance
    entity_types: [organization]

  - id: policy_position
    label: "Policy Position"
    description: "Stated stance or position on a policy issue"
    value_type: string
    category: governance
    entity_types: [organization, person]

  - id: regulatory_event
    label: "Regulatory Event"
    description: "Regulatory action, investigation, or compliance event"
    value_type: string
    category: governance
    entity_types: [organization]

  - id: lobbying_action
    label: "Lobbying Action"
    description: "Lobbying effort, advocacy action, or political engagement"
    value_type: string
    category: governance
    entity_types: [organization]

  - id: compliance_standard
    label: "Compliance Standard"
    description: "Regulatory or industry compliance standard adopted"
    value_type: string
    category: governance
    entity_types: [organization]

  - id: transparency_report
    label: "Transparency Report"
    description: "Published transparency report or disclosure document"
    value_type: string
    category: governance
    entity_types: [organization]

  - id: voluntary_commitment
    label: "Voluntary Commitment"
    description: "Voluntary commitment or pledge related to AI safety or ethics"
    value_type: string
    category: governance
    entity_types: [organization]

  - id: international_agreement
    label: "International Agreement"
    description: "International agreement, treaty, or multi-party commitment"
    value_type: string
    category: governance
    entity_types: [organization]

  # ── Attribution ────────────────────────────────────────────────────────
  - id: prediction
    label: "Prediction"
    description: "Forward-looking prediction or forecast attributed to a person"
    value_type: string
    category: research
    entity_types: [person, organization]

  - id: public_statement
    label: "Public Statement"
    description: "Notable public statement, quote, or position expressed publicly"
    value_type: string
    category: organizational
    entity_types: [person, organization]

  - id: interview_quote
    label: "Interview Quote"
    description: "Notable quote from an interview, podcast, or testimony"
    value_type: string
    category: organizational
    entity_types: [person]

  # ── Competitive & Market ───────────────────────────────────────────────
  - id: competitor
    label: "Competitor"
    description: "Organization with a competitive relationship"
    value_type: entity
    category: relation
    entity_types: [organization]

  - id: partner
    label: "Partner"
    description: "Organization in a partnership or collaboration"
    value_type: entity
    category: relation
    entity_types: [organization]

  - id: investor
    label: "Investor"
    description: "Investor in the organization"
    value_type: entity
    category: relation
    entity_types: [organization]

  - id: subsidiary
    label: "Subsidiary"
    description: "Child or subsidiary organization"
    value_type: entity
    category: relation
    entity_types: [organization]

  # ── Generic Fallback ───────────────────────────────────────────────────
  - id: count
    label: "Count"
    description: "Generic count measure (fallback for unclassified numeric counts)"
    value_type: number
    value_unit: count
    category: organizational

  - id: percent
    label: "Percentage"
    description: "Generic percentage measure (fallback for unclassified percentages)"
    value_type: number
    value_unit: percent
    category: organizational
