- id: tau-bench
  numericId: E1254
  type: benchmark
  title: TAU-bench
  description: "Tool Agent User benchmark from Sierra AI — evaluates AI agents on realistic customer service scenarios requiring multi-turn tool use across airline and retail domains."
  category: agentic
  scoringMethod: percentage
  higherIsBetter: true
  introducedDate: "2024-06"
  maintainer: "Sierra AI"
  sources:
    - title: "TAU-bench: A Benchmark for Tool-Agent-User Interaction in Real-World Domains"
