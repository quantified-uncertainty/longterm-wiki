# AI Benchmarks — entity definitions for the benchmark entity type.
# Each entry represents a distinct evaluation benchmark for AI models.
# Benchmark results (model scores) are stored in the wiki-server PG database.

- id: mmlu
  numericId: E1100
  type: benchmark
  title: MMLU
  description: "Massive Multitask Language Understanding — a multiple-choice benchmark covering 57 academic subjects from STEM to humanities."
  category: knowledge
  scoringMethod: accuracy
  higherIsBetter: true
  introducedDate: "2021-01"
  maintainer: "Dan Hendrycks et al."
  website: "https://github.com/hendrycks/test"
  sources:
    - title: "Measuring Massive Multitask Language Understanding"
      url: "https://arxiv.org/abs/2009.03300"

- id: swe-bench-verified
  numericId: E1101
  type: benchmark
  title: SWE-bench Verified
  description: "A curated subset of SWE-bench with human-verified task instances for evaluating AI systems on real-world software engineering tasks from GitHub issues."
  category: coding
  scoringMethod: percentage
  higherIsBetter: true
  introducedDate: "2024-08"
  maintainer: "OpenAI / Princeton NLP"
  website: "https://www.swebench.com"
  sources:
    - title: "SWE-bench: Can Language Models Resolve Real-World GitHub Issues?"
      url: "https://arxiv.org/abs/2310.06770"

- id: math-benchmark
  numericId: E1102
  type: benchmark
  title: MATH
  description: "A dataset of 12,500 competition mathematics problems testing mathematical reasoning across difficulty levels 1-5."
  category: math
  scoringMethod: accuracy
  higherIsBetter: true
  introducedDate: "2021-03"
  maintainer: "Dan Hendrycks et al."
  sources:
    - title: "Measuring Mathematical Problem Solving With the MATH Dataset"
      url: "https://arxiv.org/abs/2103.03874"

- id: humaneval
  numericId: E1103
  type: benchmark
  title: HumanEval
  description: "A benchmark of 164 hand-written Python programming problems with unit tests, evaluating code generation from docstrings."
  category: coding
  scoringMethod: pass_at_1
  higherIsBetter: true
  introducedDate: "2021-07"
  maintainer: OpenAI
  sources:
    - title: "Evaluating Large Language Models Trained on Code"
      url: "https://arxiv.org/abs/2107.03374"

- id: gpqa-diamond
  numericId: E1104
  type: benchmark
  title: GPQA Diamond
  description: "Graduate-level Google-Proof Q&A Diamond subset — extremely difficult questions in physics, chemistry, and biology that even domain experts struggle with."
  category: reasoning
  scoringMethod: accuracy
  higherIsBetter: true
  introducedDate: "2023-11"
  maintainer: "David Rein et al."
  sources:
    - title: "GPQA: A Graduate-Level Google-Proof Q&A Benchmark"
      url: "https://arxiv.org/abs/2311.12022"

- id: arc-agi
  numericId: E1105
  type: benchmark
  title: ARC-AGI
  description: "Abstraction and Reasoning Corpus — a benchmark of visual pattern recognition tasks designed to test fluid intelligence and novel reasoning."
  category: reasoning
  scoringMethod: accuracy
  higherIsBetter: true
  introducedDate: "2019-11"
  maintainer: "Francois Chollet"
  website: "https://arcprize.org"
  sources:
    - title: "On the Measure of Intelligence"
      url: "https://arxiv.org/abs/1911.01547"

- id: arc-agi-2
  numericId: E1106
  type: benchmark
  title: ARC-AGI-2
  description: "Second iteration of the ARC benchmark with harder tasks, designed to remain challenging as AI capabilities improve."
  category: reasoning
  scoringMethod: accuracy
  higherIsBetter: true
  introducedDate: "2025-01"
  maintainer: "Francois Chollet / ARC Prize Foundation"
  website: "https://arcprize.org"

- id: terminal-bench-hard
  numericId: E1107
  type: benchmark
  title: Terminal-Bench Hard
  description: "A benchmark evaluating AI agents on complex terminal-based tasks requiring multi-step reasoning and system administration skills."
  category: agentic
  scoringMethod: percentage
  higherIsBetter: true
  introducedDate: "2025-01"
  sources:
    - title: "Terminal-Bench"
      url: "https://github.com/terminal-bench/terminal-bench"

- id: terminal-bench-2
  numericId: E1108
  type: benchmark
  title: Terminal-Bench 2
  description: "Second version of the Terminal-Bench benchmark with expanded task coverage and difficulty."
  category: agentic
  scoringMethod: percentage
  higherIsBetter: true
  introducedDate: "2025-06"

- id: artificial-analysis-intelligence-index
  numericId: E1109
  type: benchmark
  title: Artificial Analysis Intelligence Index
  description: "A composite intelligence index from Artificial Analysis that aggregates performance across multiple benchmarks to provide a single capability score."
  category: general
  scoringMethod: points
  higherIsBetter: true
  introducedDate: "2024-06"
  maintainer: "Artificial Analysis"
  website: "https://artificialanalysis.ai"

- id: osworld
  numericId: E1110
  type: benchmark
  title: OSWorld
  description: "A benchmark for multimodal agents on real-world computer tasks across operating systems, testing GUI interaction and task completion."
  category: agentic
  scoringMethod: percentage
  higherIsBetter: true
  introducedDate: "2024-04"
  sources:
    - title: "OSWorld: Benchmarking Multimodal Agents for Open-Ended Tasks in Real Computer Environments"
      url: "https://arxiv.org/abs/2404.07972"

- id: aime-2025
  numericId: E1111
  type: benchmark
  title: AIME 2025
  description: "American Invitational Mathematics Examination 2025 — a prestigious math competition used as a benchmark for advanced mathematical reasoning."
  category: math
  scoringMethod: accuracy
  higherIsBetter: true
  introducedDate: "2025-02"
  maintainer: "Mathematical Association of America"

- id: mmlu-pro
  numericId: E1301
  type: benchmark
  title: MMLU-Pro
  description: "A harder variant of MMLU with 10 answer choices (vs 4), chain-of-thought reasoning, and reduced sensitivity to prompt format. Designed to better discriminate among top models."
  category: knowledge
  scoringMethod: accuracy
  higherIsBetter: true
  introducedDate: "2024-06"
  maintainer: "TIGER Lab"
  website: "https://github.com/TIGER-AI-Lab/MMLU-Pro"
  sources:
    - title: "MMLU-Pro: A More Robust and Challenging Multi-Task Language Understanding Benchmark"
      url: "https://arxiv.org/abs/2406.01574"

- id: simpleqa
  numericId: E1302
  type: benchmark
  title: SimpleQA
  description: "A factual question-answering benchmark from OpenAI testing short, fact-seeking questions with verifiable answers. Evaluates factual accuracy and calibration."
  category: knowledge
  scoringMethod: accuracy
  higherIsBetter: true
  introducedDate: "2024-10"
  maintainer: "OpenAI"
  sources:
    - title: "SimpleQA: Measuring short-form factuality in large language models"
      url: "https://openai.com/index/introducing-simpleqa/"

- id: humanitys-last-exam
  numericId: E1235
  type: benchmark
  title: "Humanity's Last Exam"
  description: "A benchmark of 2,500+ expert-level questions across dozens of academic disciplines, designed to be the hardest public AI evaluation. Questions contributed by domain experts worldwide."
  category: reasoning
  scoringMethod: accuracy
  higherIsBetter: true
  introducedDate: "2025-01"
  maintainer: "Scale AI / Center for AI Safety"
  website: "https://lastexam.ai"
  sources:
    - title: "Humanity's Last Exam"
      url: "https://arxiv.org/abs/2501.14249"

- id: ifeval
  numericId: E1236
  type: benchmark
  title: IFEval
  description: "Instruction-Following Evaluation benchmark testing whether LLMs can follow explicit formatting constraints (e.g., 'write exactly 3 paragraphs', 'include these keywords')."
  category: general
  scoringMethod: accuracy
  higherIsBetter: true
  introducedDate: "2023-11"
  maintainer: "Google Research"
  sources:
    - title: "Instruction-Following Evaluation for Large Language Models"
      url: "https://arxiv.org/abs/2311.07911"

- id: chatbot-arena-elo
  numericId: E1237
  type: benchmark
  title: Chatbot Arena Elo
  description: "Community-driven model ranking based on pairwise human preference votes. Users compare anonymous model outputs and vote for the better response. Over 2 million votes collected."
  category: general
  scoringMethod: elo
  higherIsBetter: true
  introducedDate: "2023-05"
  maintainer: "LMArena (formerly LMSYS)"
  website: "https://arena.ai"
  sources:
    - title: "Chatbot Arena: An Open Platform for Evaluating LLMs by Human Preference"
      url: "https://arxiv.org/abs/2403.04132"

- id: livecodebench
  numericId: E1238
  type: benchmark
  title: LiveCodeBench
  description: "A contamination-free coding benchmark using new competitive programming problems from LeetCode, AtCoder, and Codeforces. Problems are refreshed continuously to prevent data leakage."
  category: coding
  scoringMethod: pass_at_1
  higherIsBetter: true
  introducedDate: "2024-06"
  maintainer: "LiveCodeBench Team"
  website: "https://livecodebench.github.io"
  sources:
    - title: "LiveCodeBench: Holistic and Contamination Free Evaluation of Large Language Models for Code"
      url: "https://arxiv.org/abs/2403.07974"

- id: livebench
  numericId: E1240
  type: benchmark
  title: LiveBench
  description: "A monthly-refreshed benchmark with objective ground-truth answers across math, coding, reasoning, language, instruction following, and data analysis. Designed to resist contamination."
  category: general
  scoringMethod: percentage
  higherIsBetter: true
  introducedDate: "2024-06"
  maintainer: "LiveBench Team"
  website: "https://livebench.ai"
  sources:
    - title: "LiveBench: A Challenging, Contamination-Free LLM Benchmark"
      url: "https://arxiv.org/abs/2406.19314"

- id: bfcl
  numericId: E1241
  type: benchmark
  title: BFCL
  description: "Berkeley Function Calling Leaderboard — evaluates LLMs on their ability to correctly generate function/tool calls including parameter extraction, type handling, and multi-turn interactions."
  category: coding
  scoringMethod: accuracy
  higherIsBetter: true
  introducedDate: "2024-02"
  maintainer: "UC Berkeley"
  website: "https://gorilla.cs.berkeley.edu/leaderboard.html"
  sources:
    - title: "Berkeley Function Calling Leaderboard"
      url: "https://arxiv.org/abs/2402.15491"

- id: frontiermath
  numericId: E1242
  type: benchmark
  title: FrontierMath
  description: "Research-grade mathematics benchmark from Epoch AI featuring original problems created by professional mathematicians. Designed to remain unsaturated for years."
  category: math
  scoringMethod: accuracy
  higherIsBetter: true
  introducedDate: "2024-11"
  maintainer: "Epoch AI"
  website: "https://epoch.ai/frontiermath"
  sources:
    - title: "FrontierMath: A Benchmark for Evaluating Advanced Mathematical Reasoning in AI"
      url: "https://arxiv.org/abs/2411.04872"

- id: aime-2024
  numericId: E1243
  type: benchmark
  title: AIME 2024
  description: "American Invitational Mathematics Examination 2024 — a prestigious math competition testing advanced problem-solving. 30 problems with integer answers 0-999."
  category: math
  scoringMethod: accuracy
  higherIsBetter: true
  introducedDate: "2024-02"
  maintainer: "Mathematical Association of America"

- id: bbh
  numericId: E1245
  type: benchmark
  title: BBH
  description: "BIG-Bench Hard — a curated subset of 23 challenging tasks from BIG-Bench where language models previously failed to outperform average human raters. Tests multi-step reasoning."
  category: reasoning
  scoringMethod: accuracy
  higherIsBetter: true
  introducedDate: "2022-10"
  maintainer: "Google / Stanford"
  sources:
