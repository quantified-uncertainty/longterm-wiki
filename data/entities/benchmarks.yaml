  category: agentic
  scoringMethod: percentage
  higherIsBetter: true
  introducedDate: "2024-09"
  maintainer: "OpenAI"
  sources:
    - title: "MLE-bench: Evaluating Machine Learning Agents on Machine Learning Engineering"
