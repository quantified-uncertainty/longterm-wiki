  scoringMethod: accuracy
  higherIsBetter: true
  introducedDate: "2019-05"
  maintainer: "AI2 / University of Washington"
  sources:
    - title: "HellaSwag: Can a Machine Really Finish Your Sentence?"
      url: "https://arxiv.org/abs/1905.07830"

- id: re-bench
  numericId: E1249
  type: benchmark
  title: RE-Bench
  description: "Research Engineering Benchmark from METR — evaluates AI agents on 7 challenging ML research engineering tasks requiring multi-step problem solving over extended time horizons."
  category: agentic
  scoringMethod: percentage
  higherIsBetter: true
  introducedDate: "2024-11"
  maintainer: "METR"
  sources:
    - title: "RE-Bench: Evaluating frontier AI R&D capabilities of language model agents against human experts"
