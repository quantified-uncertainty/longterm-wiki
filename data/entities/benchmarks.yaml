  category: agentic
  scoringMethod: percentage
  higherIsBetter: true
  introducedDate: "2023-07"
  maintainer: "CMU"
  website: "https://webarena.dev"
  sources:
    - title: "WebArena: A Realistic Web Environment for Building Autonomous Agents"
