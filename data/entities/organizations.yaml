    least 10% of their lifetime income to the most effective charities they can find. GWWC provides
    resources to help donors identify high-impact charities, primarily through referrals to organizations
    like GiveWell's top charities. The pledge community has grown to over 9,000 members who have collectively
    donated or pledged over $3 billion to effective charities. GWWC is now part of the Centre for Effective
